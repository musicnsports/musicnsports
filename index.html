<script>
// ===== SUPABASE CONFIG =====
const SUPABASE_URL = 'https://dsgilznlijicfwxgxilv.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRzZ2lsem5saWppY2Z3eGd4aWx2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5MDEzNjIsImV4cCI6MjA5OTQ3NzM2Mn0.y0pvBThvU6YX3x-nqJj3Aow_YLPWb-b-3Yw9EezUtGA';

const SITE_URL = 'https://www.musicnsports.com/';
const redirectUrl = (window.location.origin === 'null' || window.location.origin.includes('localhost') || window.location.origin.includes('127.0.0.1')) 
  ? window.location.href 
  : SITE_URL;

let supabaseClient = null;
let hasSupabase = false;

if (SUPABASE_URL && SUPABASE_ANON_KEY && SUPABASE_ANON_KEY.startsWith('eyJ')) {
  try {
    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    hasSupabase = true;
  } catch(e) { console.error('❌ Supabase init failed:', e); }
}

// ===== STATE =====
let currentUser = null;
let currentProfile = null;
let usersCache = {};
let posts = [];
let likesMap = {};
let commentsMap = {};
let followsCache = {};
let notifications = [];

// ===== UTILS =====
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const getYouTubeId = url => { const m = url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/); return m ? m[1] : null; };
const getVimeoId = url => { const m = url.match(/vimeo\.com\/(\d+)/); return m ? m[1] : null; };
const getInstagramId = url => { const m = url.match(/instagram\.com\/(?:p|reel|reels)\/([A-Za-z0-9_-]+)/); return m ? m[1] : null; };
const getTikTokId = url => { const m = url.match(/tiktok\.com\/.*\/video\/(\d+)/) || url.match(/vm\.tiktok\.com\/([A-Za-z0-9]+)/) || url.match(/tiktok\.com\/@[^\/]+\/video\/(\d+)/); return m ? m[1] : null; };
const getVideoId = url => getYouTubeId(url) || getVimeoId(url) || getInstagramId(url) || getTikTokId(url);
const getVideoType = url => { if(getYouTubeId(url)) return 'youtube'; if(getVimeoId(url)) return 'vimeo'; if(getInstagramId(url)) return 'instagram'; if(getTikTokId(url)) return 'tiktok'; return 'unknown'; };
const thumbFromUrl = url => { 
  const y=getYouTubeId(url); if(y) return `https://img.youtube.com/vi/${y}/mqdefault.jpg`; 
  const v=getVimeoId(url); if(v) return `https://vumbnail.com/${v}.jpg`; 
  const ig=getInstagramId(url); if(ig) return `https://via.placeholder.com/320x180/833AB4/ffffff?text=Instagram+Reel`;
  const tt=getTikTokId(url); if(tt) return `https://via.placeholder.com/320x180/000000/ffffff?text=TikTok+Video`;
  return 'https://via.placeholder.com/320x180?text=Video'; 
};
const getEmbedUrl = (url, video_id) => {
  const type = getVideoType(url);
  if(type==='youtube') return `https://www.youtube.com/embed/${video_id}?autoplay=1`;
  if(type==='vimeo') return `https://player.vimeo.com/video/${video_id}?autoplay=1`;
  if(type==='instagram') return `https://www.instagram.com/p/${video_id}/embed`;
  if(type==='tiktok') return `https://www.tiktok.com/embed/${video_id}`;
  return url;
};
const timeAgo = ts => { const d=new Date(ts); const s=Math.floor((Date.now()-d.getTime())/1000); if(s<60) return `${s}s ago`; const m=Math.floor(s/60); if(m<60) return `${m}m ago`; const h=Math.floor(m/60); if(h<24) return `${h}h ago`; const day=Math.floor(h/24); return `${day}d ago`; };
const getBaseUrl = () => window.location.href.split('?')[0].split('#')[0];

// ===== INIT =====
async function init(){
  showMain();
  renderAuth();

  const hashParams = new URLSearchParams(window.location.hash.substring(1));
  if (hashParams.get('type') === 'recovery') {
    showResetPasswordPage();
    return; 
  }

  if(hasSupabase){
    try{
      const { data:{session} } = await supabaseClient.auth.getSession();
      if(session?.user) {
        await loadProfile(session.user);
        await loadNotifications();
      }
      await loadAllData();
      
      const params = new URLSearchParams(window.location.search);
      const shareVideoId = params.get('v');
      const shareUserId = params.get('u');
      
      if (shareVideoId) showVideo(shareVideoId);
      else if (shareUserId) showProfile(shareUserId);

      supabaseClient.auth.onAuthStateChange(async (ev, sess)=>{
        if(sess?.user) {
          await loadProfile(sess.user);
          await loadNotifications();
        } else { 
          currentUser=null; currentProfile=null; notifications=[]; 
          updateNotifBadge();
        }
        renderAuth(); await loadAllData(); renderFeed();
      });
    }catch(e){ console.error('Supabase load error', e); }
  }
  renderAuth();
  renderFeed();
}

async function loadProfile(user){
  currentUser = user;
  try{
    let { data } = await supabaseClient.from('profiles').select('*').eq('id', user.id).single();
    
    if(data && data.deleted_at) {
      alert('This account has been deleted and can no longer be accessed.');
      await supabaseClient.auth.signOut();
      currentUser = null; currentProfile = null;
      renderAuth(); showMain();
      return;
    }

    if(!data){
      const username = user.user_metadata?.username || user.email.split('@')[0].replace(/[^a-z0-9_]/gi,'');
      const { data: newP } = await supabaseClient.from('profiles').insert({ id:user.id, username, avatar_url:`https://api.dicebear.com/7.x/thumbs/svg?seed=${username}`, bio:'' }).select().single();
      data = newP;
    }
    currentProfile = data;
    if(data) usersCache[data.id]=data;
  }catch(e){ console.error(e); }
}

async function loadAllData(){
  if(!hasSupabase) return;
  try{
    const [{data:profiles},{data:videos},{data:likes},{data:comments},{data:follows}] = await Promise.all([
      supabaseClient.from('profiles').select('*'),
      supabaseClient.from('videos').select('*').order('created_at',{ascending:false}),
      supabaseClient.from('likes').select('*'),
      supabaseClient.from('comments').select('*'),
      supabaseClient.from('followers').select('*')
    ]);
    (profiles||[]).forEach(p=>usersCache[p.id]=p);
    posts = videos||[];
    likesMap={}; commentsMap={}; followsCache={};
    (likes||[]).forEach(l=>{ if(!likesMap[l.video_id]) likesMap[l.video_id]=[]; likesMap[l.video_id].push(l); });
    (comments||[]).forEach(c=>{ if(!commentsMap[c.video_id]) commentsMap[c.video_id]=[]; commentsMap[c.video_id].push(c); });
    (follows||[]).forEach(f=>{ if(!followsCache[f.follower_id]) followsCache[f.follower_id]={}; followsCache[f.follower_id][f.following_id]=true; });
  }catch(e){ console.error('loadAllData failed', e); }
}

// ===== NOTIFICATIONS LOGIC =====
async function loadNotifications() {
  if(!hasSupabase || !currentUser) return;
  try {
    const { data } = await supabaseClient.from('notifications').select('*').eq('recipient_id', currentUser.id).order('created_at', { ascending: false }).limit(20);
    if(data) { notifications = data; updateNotifBadge(); }
  } catch(e) { console.error('Notif load error', e); }
}

function updateNotifBadge() {
  const badge = $('#notifBadge'); if(!badge) return;
  const unreadCount = notifications.filter(n => !n.is_read).length;
  if(unreadCount > 0) { badge.textContent = unreadCount > 9 ? '9+' : unreadCount; badge.classList.remove('hidden'); } 
  else { badge.classList.add('hidden'); }
}

async function clearNotifications() {
  if(!currentUser || !hasSupabase) return;
  await supabaseClient.from('notifications').delete().eq('recipient_id', currentUser.id);
  notifications = [];
  updateNotifBadge();
  showNotifications();
}

// ===== AUTH UI =====
function renderAuth(){
  const el=$('#authSection'); if(!el) return;
  if(currentUser && currentProfile){
    el.innerHTML=`<div class="flex items-center gap-3"><button onclick="showProfile('${currentUser.id}')" class="flex items-center gap-2 hover:bg-white/5 rounded-lg px-3 py-2"><img src="${currentProfile.avatar_url}" class="w-8 h-8 rounded-full"><span class="font-semibold hidden sm:block">@${currentProfile.username}</span></button><button onclick="logout()" class="text-gray-400 hover:text-white text-sm">Logout</button></div>`;
    const b=document.getElementById('uploadBtn'); if(b) b.classList.remove('hidden');
  }else{
    el.innerHTML=`<button onclick="showLogin()" class="px-4 py-2 text-gray-300 hover:text-white">Login</button><button onclick="showSignup()" class="px-4 py-2 bg-neon-cyan text-dark-900 font-semibold rounded-lg btn-glow">Sign Up</button>`;
    const b=document.getElementById('uploadBtn'); if(b) b.classList.add('hidden');
  }
}
async function logout(){ if(hasSupabase) await supabaseClient.auth.signOut(); currentUser=null; currentProfile=null; showMain(); renderAuth(); }

// ===== MODALS =====
function showModal(html, wide=false){ const c=$('#modalContainer'); c.innerHTML=`<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm" onclick="if(event.target===this) closeModal()"><div class="glass rounded-2xl p-6 w-full ${wide?'max-w-3xl':'max-w-md'} relative max-h-[90vh] overflow-y-auto"><button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>${html}</div></div>`; }
function closeModal(){ $('#modalContainer').innerHTML=''; }

function showSignup(){ showModal(`<h3 class="font-display font-bold text-2xl mb-6">Create Account</h3><form onsubmit="handleSignup(event)" class="space-y-4"><input id="su_email" type="email" placeholder="Email Address" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3 focus:border-neon-cyan focus:outline-none"><input id="su_username" type="text" placeholder="Username" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3"><input id="su_password" type="password" placeholder="Password (Min 6 chars)" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3"><button class="w-full py-3 bg-gradient-to-r from-neon-cyan to-neon-green text-dark-900 font-bold rounded-lg">Sign Up</button><p class="text-center text-gray-400 text-sm">Have account? <button type="button" onclick="closeModal();showLogin()" class="text-neon-cyan">Login</button></p></form>`); }

async function handleSignup(e){ 
  e.preventDefault(); if(!hasSupabase) return;
  const email=document.getElementById('su_email').value.trim(); 
  const username=document.getElementById('su_username').value.trim().replace(/\s+/g,'_'); 
  const password=document.getElementById('su_password').value; 
  const { data: ex } = await supabaseClient.from('profiles').select('id').eq('username',username).maybeSingle(); 
  if(ex) return alert('Username taken'); 
  
  const { data, error } = await supabaseClient.auth.signUp({ email, password, options: { data: { username } } }); 
  if(error) return alert(error.message); 
  
  if(data.user){ 
    await supabaseClient.from('profiles').insert({ id:data.user.id, username, avatar_url:`https://api.dicebear.com/7.x/thumbs/svg?seed=${username}`, bio:'' }); 
    closeModal(); 
    
    if (data.session) {
      alert('Account created! You are now logged in.');
    } else {
      alert('Verification email sent! Please check your inbox to verify your email address before logging in.');
      currentUser = null; currentProfile = null;
      renderAuth(); renderFeed();
    }
  } 
}

function showLogin(){ showModal(`<h3 class="font-display font-bold text-2xl mb-6">Welcome Back</h3><form onsubmit="handleLogin(event)" class="space-y-4"><input id="li_email" type="email" placeholder="Email Address" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3"><input id="li_password" type="password" placeholder="Password" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3"><button class="w-full py-3 bg-gradient-to-r from-neon-cyan to-neon-green text-dark-900 font-bold rounded-lg">Login</button></form><p class="text-center text-gray-400 text-sm mt-4"><button type="button" onclick="showForgotPassword()" class="text-neon-cyan hover:underline">Forgot password?</button></p>`); }

async function handleLogin(e){ 
  e.preventDefault(); if(!hasSupabase) return;
  const email=document.getElementById('li_email').value.trim(); 
  const password=document.getElementById('li_password').value; 
  const { error } = await supabaseClient.auth.signInWithPassword({ email, password }); 
  if(error) return alert(error.message); 
  closeModal(); 
}

function showForgotPassword() {
  showModal(`<h3 class="font-display font-bold text-2xl mb-6">Reset Password</h3><form onsubmit="handleForgotPassword(event)" class="space-y-4"><input id="fp_email" type="email" placeholder="Enter your email address" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3"><button class="w-full py-3 bg-gradient-to-r from-neon-cyan to-neon-green text-dark-900 font-bold rounded-lg">Send Reset Link</button><p class="text-center text-gray-400 text-sm">Remembered it? <button type="button" onclick="closeModal();showLogin()" class="text-neon-cyan hover:underline">Back to Login</button></p></form>`);
}

async function handleForgotPassword(e) {
  e.preventDefault(); if(!hasSupabase) return;
  const email = document.getElementById('fp_email').value.trim();
  const { error } = await supabaseClient.auth.resetPasswordForEmail(email, { redirectTo: redirectUrl });
  if(error) return alert(error.message);
  alert('Password reset link sent! Check your email inbox.');
  closeModal();
}

function showResetPasswordPage() {
  document.getElementById('mainContent').innerHTML = `
    <div class="max-w-md mx-auto mt-20">
      <div class="glass rounded-2xl p-8 text-center">
        <h2 class="font-display font-bold text-3xl mb-6 text-neon-cyan">Reset Password</h2>
        <form onsubmit="handleUpdatePassword(event)" class="space-y-4">
          <input id="new_pass" type="password" placeholder="New Password (Min 6 chars)" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3 focus:border-neon-cyan focus:outline-none">
          <button class="w-full py-3 bg-gradient-to-r from-neon-cyan to-neon-green text-dark-900 font-bold rounded-lg">Update Password</button>
        </form>
        <p class="text-gray-400 text-sm mt-6">Remembered it? <a href="${SITE_URL}" class="text-neon-cyan hover:underline">Back to Home</a></p>
      </div>
    </div>
  `;
}

async function handleUpdatePassword(e) {
  e.preventDefault();
  const password = document.getElementById('new_pass').value;
  const { error } = await supabaseClient.auth.updateUser({ password });
  if (error) return alert(error.message);
  alert('Password updated successfully!');
  window.location.href = SITE_URL; 
}

// ===== MAIN + FEED =====

  let joinBanner = '';
  if(!currentUser) {
    joinBanner = `<div class="glass rounded-xl p-4 mb-6 flex flex-col sm:flex-row items-center justify-between gap-4 border border-neon-cyan/30">
      <p class="text-center sm:text-left text-gray-200"><span class="font-bold text-neon-cyan">Want to post your own mix?</span> Join the community and share your highlights!</p>
      <button onclick="showSignup()" class="px-6 py-2 bg-neon-cyan text-dark-900 font-bold rounded-lg whitespace-nowrap hover:scale-105 transition">Sign Up Free</button>
    </div>`;
  }

  document.getElementById('mainContent').innerHTML = joinBanner + `
    <section class="text-center mb-12"><h2 class="font-display font-black text-4xl md:text-6xl mb-4 bg-gradient-to-r from-neon-cyan via-neon-green to-neon-purple bg-clip-text text-transparent">All Music - All Sports</h2><p class="text-gray-400 text-lg max-w-2xl mx-auto mb-8">Post your music videos, athletic skills, and fire sports edits. Showcase your beats and live performances. Promote your podcast, athletic training, music lessons, and dance tutorials. Create a fan page, Free.</p><button id="uploadBtn" onclick="openUploadModal()" class="px-8 py-4 bg-gradient-to-r from-neon-cyan to-neon-green text-dark-900 font-bold rounded-xl btn-glow hover:scale-105 transition ${!currentUser?'hidden':''}">Post Your Mix</button></section>
    <section class="glass rounded-2xl p-4 mb-8 sticky top-20 z-40"><div class="grid grid-cols-1 md:grid-cols-5 gap-3"><input id="searchInput" type="text" placeholder="Search title, user, or description..." class="md:col-span-2 bg-dark-700 border border-white/10 rounded-lg px-4 py-2 focus:outline-none focus:border-neon-cyan"><select id="sportFilter" class="bg-dark-700 border border-white/10 rounded-lg px-4 py-2"><option value="all">All Sports</option><option>Basketball</option><option>Football</option><option>Soccer</option><option>MMA</option><option>Baseball</option><option>Hockey</option><option>Tennis</option><option>Track & Field</option><option>Aquatic Sports</option><option>Rodeo Sports</option><option>Motor Sports</option><option>Other</option></select><select id="musicFilter" class="bg-dark-700 border border-white/10 rounded-lg px-4 py-2"><option value="all">All Music</option><option>Hip-Hop</option><option>Rock</option><option>EDM</option><option>Pop</option><option>Country</option><option>Latin</option><option>K-Pop</option><option>R&B/Soul</option><option>Reggae</option><option>Classical</option><option>Folk</option><option>Instrumental</option><option>Other</option></select><select id="sortFilter" class="bg-dark-700 border border-white/10 rounded-lg px-4 py-2"><option value="newest">Newest</option><option value="likes">Most Liked</option><option value="comments">Most Commented</option></select></div></section>

// FIX 3: Notify followers of new posts
async function handleUpload(e){ 
  e.preventDefault(); if(!hasSupabase) return;
  const title=document.getElementById('up_title').value.trim(); 
  const video_url=document.getElementById('up_url').value.trim(); 
  const sport=document.getElementById('up_sport').value; 
  const music=document.getElementById('up_music').value; 
  const description=document.getElementById('up_desc').value.trim(); 
  const video_id=getVideoId(video_url); if(!video_id) return alert('Invalid URL'); 
  const video_type = getVideoType(video_url);
  
  const { data:dup } = await supabaseClient.from('videos').select('id').eq('video_id',video_id); 
  if(dup&&dup.length>0) return alert('This video has already been posted!'); 
  
  // Insert and get the new video data
  const { data: newVideo, error } = await supabaseClient.from('videos').insert({ user_id:currentUser.id, title, video_url, video_id, video_type, sport, music, description, thumbnail:thumbFromUrl(video_url) }).select().single();
  if(error) return alert(error.message); 

  // Notify all followers about the new post
  const { data: myFollowers } = await supabaseClient.from('followers').select('follower_id').eq('following_id', currentUser.id);
  if (myFollowers && myFollowers.length > 0) {
    const bulkNotifs = myFollowers.map(f => ({
      recipient_id: f.follower_id,
      actor_id: currentUser.id,
      type: 'new_post',
      video_id: newVideo.id,
      content: newVideo.title
    }));
    await supabaseClient.from('notifications').insert(bulkNotifs);
  }

  closeModal(); await loadAllData(); showMain(); 
}

async function toggleLike(id){ 
  if(!currentUser) return showLogin(); 
  const ex=likesMap[id]?.find(l=>l.user_id===currentUser.id); 
  if(ex){ await supabaseClient.from('likes').delete().eq('id',ex.id); } 
  else { 
    await supabaseClient.from('likes').insert({ user_id:currentUser.id, video_id:id }); 
    const video = posts.find(p => p.id == id);
    if(video) {
      await supabaseClient.from('notifications').insert({ recipient_id: video.user_id, actor_id: currentUser.id, type: 'like', video_id: video.id });
      if(video.user_id === currentUser.id) await loadNotifications();
    }
  } 
  await loadAllData(); renderFeed(); 
}

function replyToComment(text) {
  const input = document.getElementById('cInput');
  if(input) { input.value = text; input.focus(); }
}

async function toggleCommentLike(commentId, videoId) {
  if(!currentUser) return showLogin();
  const { data: existing } = await supabaseClient.from('comment_likes').select('id').eq('user_id', currentUser.id).eq('comment_id', commentId).maybeSingle();
  if(existing) {
    await supabaseClient.from('comment_likes').delete().eq('id', existing.id);
  } else {
    await supabaseClient.from('comment_likes').insert({ user_id: currentUser.id, comment_id: commentId });
  }
  showVideo(videoId); 
}

function shareVideo(id) {
  const url = `${getBaseUrl()}?v=${id}`;
  if (navigator.share) { navigator.share({ title: 'Check out this mix on MusicNSports!', url }); } 
  else { navigator.clipboard.writeText(url).then(() => alert('Link copied to clipboard!')).catch(() => prompt('Copy this link:', url)); }
}

async function addComment(e,id){ 
  e.preventDefault(); if(!hasSupabase) return; 
  const textVal=document.getElementById('cInput').value.trim(); if(!textVal) return; 
  const { error } = await supabaseClient.from('comments').insert({ user_id:currentUser.id, video_id:id, text: textVal }); 
  if(error) return alert(error.message); 
  const video = posts.find(p => p.id == id);
  if(video) {
    await supabaseClient.from('notifications').insert({ recipient_id: video.user_id, actor_id: currentUser.id, type: 'comment', video_id: video.id, content: textVal });
    if(video.user_id === currentUser.id) await loadNotifications();
  }
  showVideo(id); await loadAllData(); 
}

async function deleteComment(cid,vid){ 
  if(!confirm('Delete?')) return; 
  await supabaseClient.from('comments').delete().eq('id',cid); 
  showVideo(vid); await loadAllData(); 
}

async function showProfile(uid){ 
  let prof=usersCache[uid]; 
  if(!prof && hasSupabase){ const { data } = await supabaseClient.from('profiles').select('*').eq('id',uid).single(); prof=data; } 
  if(!prof) return; 
  
  let userPosts=[]; let followers=[]; let following=[]; let isFollowing=false; 
  
  if(hasSupabase){ 
    // Use simple selects for counts - joins to profiles fail if FK points to auth.users not profiles
    let vData, f1Data, f2Data;
    const vRes = await supabaseClient.from('videos').select('*').eq('user_id',uid).order('created_at',{ascending:false});
    vData = vRes.data;
    
    // Followers: try following_id, fallback to user_id
    let f1Res = await supabaseClient.from('followers').select('*').eq('following_id',uid);
    if(f1Res.error && f1Res.error.message.includes('following_id')){
      f1Res = await supabaseClient.from('followers').select('*').eq('user_id',uid);
    }
    f1Data = f1Res.data;
    
    let f2Res = await supabaseClient.from('followers').select('*').eq('follower_id',uid);
    f2Data = f2Res.data;
    
    const v = vData, f1 = f1Data, f2 = f2Data;
    userPosts=v||[]; 
    followers=f1||[]; 
    following=f2||[]; 
    
    if(currentUser && currentUser.id !== uid){ 
      const { data } = await supabaseClient.from('followers').select('*').eq('follower_id',currentUser.id).eq('following_id',uid).maybeSingle(); 
      isFollowing=!!data; 
    } 
  } 
  
  const isOwn = currentUser?.id == uid; 
  const followBtnClass = isFollowing ? 'bg-dark-600 text-white border border-white/20 hover:bg-red-600 hover:border-red-600' : 'bg-neon-cyan text-dark-900 hover:bg-neon-green font-bold';
  const followBtnText = isFollowing ? 'Following ✓' : 'Follow';
  const followBtnHoverText = isFollowing ? 'Unfollow' : 'Follow';
  
  document.getElementById('mainContent').innerHTML=`
    <div class="max-w-4xl mx-auto">
      <button onclick="showMain()" class="mb-6 text-gray-400 hover:text-white">← Back to Feed</button>
      <div class="glass rounded-2xl p-8 mb-8">

          <img src="${prof.avatar_url}" class="w-24 h-24 rounded-full border-4 border-neon-cyan/30">
          <div class="flex-1">
            <div class="flex flex-wrap items-center gap-3 mb-2">
              <h2 class="text-3xl font-bold">@${prof.username}</h2>
              ${currentUser && !isOwn ? `<button id="followBtn" onclick="toggleFollow('${uid}')" onmouseenter="if(this.textContent.includes('Following')) this.textContent='Unfollow'" onmouseleave="if(this.textContent==='Unfollow') this.textContent='Following ✓'" class="px-5 py-2 ${followBtnClass} rounded-lg text-sm font-semibold transition min-w-[110px]">${followBtnText}</button>` : ''}
              ${isOwn ? `<button onclick="showEditProfile()" class="px-4 py-2 bg-dark-600 rounded-lg text-sm hover:bg-dark-500 transition">Edit Profile</button>` : ''}
              <button onclick="shareProfile('${prof.id}')" class="px-4 py-2 bg-dark-600 rounded-lg text-sm hover:bg-dark-500 transition">↗ Share Profile</button>
            </div>
            <p class="text-gray-400 mb-4">${prof.bio||'No bio yet. Click Edit Profile to add one.'}</p>
            <div class="flex gap-6 text-sm">
              <span class="text-gray-400"><b class="text-white text-lg">${userPosts.length}</b> Posts</span>
              <button onclick="showFollowList('${uid}','followers')" class="text-gray-400 hover:text-neon-cyan transition text-left"><b class="text-white text-lg">${followers.length}</b> Followers</button>
              <button onclick="showFollowList('${uid}','following')" class="text-gray-400 hover:text-neon-purple transition text-left"><b class="text-white text-lg">${following.length}</b> Following</button>
            </div>
          </div>
        </div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        ${userPosts.map(p=>`
          <article class="glass rounded-2xl overflow-hidden cursor-pointer hover:scale-[1.02] transition" onclick="showVideo('${p.id}')">
            <div class="aspect-video bg-dark-800"><img src="${p.thumbnail||thumbFromUrl(p.video_url)}" class="w-full h-full object-cover"></div>

              <h3 class="font-bold line-clamp-2">${p.title}</h3>
              <p class="text-xs text-gray-500 mt-1">${timeAgo(p.created_at)}</p>

            </div>
          </article>
        `).join('') || '<p class="col-span-full text-center text-gray-500 py-20">No posts yet. Be the first to share a mix!</p>'}

async function showFollowList(uid, type){
  try{
    let title = type === 'followers' ? 'Followers' : 'Following';
    let list = [];
    if(type === 'followers'){
      const { data: rows } = await supabaseClient.from('followers').select('follower_id').eq('following_id', uid);
      const ids = (rows||[]).map(r=>r.follower_id);
      if(ids.length>0){
        const { data: profiles } = await supabaseClient.from('profiles').select('id, username, avatar_url, bio').in('id', ids);
        list = profiles||[];
      }
    } else {
      const { data: rows } = await supabaseClient.from('followers').select('following_id').eq('follower_id', uid);
      const ids = (rows||[]).map(r=>r.following_id);
      if(ids.length>0){
        const { data: profiles } = await supabaseClient.from('profiles').select('id, username, avatar_url, bio').in('id', ids);
        list = profiles||[];
      }
    }
    let html = `<div class="flex justify-between items-center mb-4"><h3 class="font-bold text-xl">${title} (${list.length})</h3></div><div class="space-y-2 max-h-[60vh] overflow-y-auto">`;
    if(list.length===0){
      html += `<p class="text-gray-500 text-center py-8">No ${title.toLowerCase()} yet.</p>`;
    } else {
      html += list.map(p=>`
        <div class="flex items-center justify-between p-3 bg-dark-700 rounded-xl hover:bg-dark-600 transition">
          <div class="flex items-center gap-3 cursor-pointer" onclick="closeModal(); showProfile('${p.id}')">
            <img src="${p.avatar_url}" class="w-10 h-10 rounded-full">
            <div><div class="font-bold text-white">@${p.username}</div><div class="text-xs text-gray-400 truncate max-w-[150px]">${p.bio||'No bio'}</div></div>
          </div>
          ${currentUser && currentUser.id !== p.id ? `<button onclick="toggleFollowFromList('${p.id}')" class="px-3 py-1 text-xs rounded-lg ${ (followsCache[currentUser.id] && followsCache[currentUser.id][p.id]) ? 'bg-dark-600 text-white' : 'bg-neon-cyan text-dark-900 font-bold'}">${ (followsCache[currentUser.id] && followsCache[currentUser.id][p.id]) ? 'Following' : 'Follow'}</button>` : ''}
        </div>
      `).join('');
    }
    html += `</div>`;
    showModal(html);
  }catch(e){ console.error(e); alert('Failed to load list: '+e.message); }
}

  const btn = document.getElementById('followBtn');
  const originalText = btn ? btn.textContent : 'Follow';
  if(btn){ btn.textContent='Processing...'; btn.disabled=true; btn.classList.add('opacity-60'); }
  try{
    // Try to find existing follow - try following_id first, then user_id
    let existing = null;
    let usingUserIdCol = false;
    
    let res = await supabaseClient.from('followers').select('*').eq('follower_id',currentUser.id).eq('following_id',fid).maybeSingle();
    if(res.error && (res.error.message.includes('following_id') || res.error.message.includes('does not exist'))){
      usingUserIdCol = true;
      res = await supabaseClient.from('followers').select('*').eq('follower_id',currentUser.id).eq('user_id',fid).maybeSingle();
    }
    // If error is about user_id not-null, we need to use user_id col for following
    if(res.error && res.error.message.includes('user_id') && res.error.message.includes('null')){
      usingUserIdCol = true;
    }
    if(res.error && !res.error.message.includes('No rows') && !res.error.message.includes('does not exist') && !res.error.message.includes('user_id')){
      // If it's not a "no rows" error and not about column name, throw
      if(!res.error.message.includes('null')) throw res.error;
    }
    existing = res.data;

    if(existing) {
      // UNFOLLOW
      let delRes;
      if(usingUserIdCol || (existing && existing.user_id)){
        delRes = await supabaseClient.from('followers').delete().eq('follower_id',currentUser.id).eq('user_id',fid);
        if(delRes.error && delRes.error.message.includes('following_id')){
          delRes = await supabaseClient.from('followers').delete().eq('follower_id',currentUser.id).eq('following_id',fid);
        }
      } else {
        delRes = await supabaseClient.from('followers').delete().eq('follower_id',currentUser.id).eq('following_id',fid);
        if(delRes.error && delRes.error.message.includes('following_id')){
          delRes = await supabaseClient.from('followers').delete().eq('follower_id',currentUser.id).eq('user_id',fid);
        }
      }
      if(delRes && delRes.error) throw delRes.error;
      if(followsCache[currentUser.id]) delete followsCache[currentUser.id][fid];
    } else {
      // FOLLOW - try following_id first, fallback to user_id, and also try with both columns
      let insRes = await supabaseClient.from('followers').insert({ follower_id:currentUser.id, following_id:fid });
      if(insRes.error){
        console.log('Insert with following_id failed, trying user_id:', insRes.error.message);
        // Try with user_id
        insRes = await supabaseClient.from('followers').insert({ follower_id:currentUser.id, user_id:fid });
        if(insRes.error && insRes.error.message.includes('following_id')){
          // Try with both columns populated to satisfy not-null constraints
          insRes = await supabaseClient.from('followers').insert({ follower_id:currentUser.id, following_id:fid, user_id:fid });
        }
        // If still fails because following_id is required, try with both
        if(insRes.error && insRes.error.message.includes('null') && insRes.error.message.includes('user_id')){
          insRes = await supabaseClient.from('followers').insert({ follower_id:currentUser.id, following_id:fid, user_id:fid });
        }
      }
      if(insRes.error) throw insRes.error;
      if(!followsCache[currentUser.id]) followsCache[currentUser.id] = {};
      followsCache[currentUser.id][fid] = true;
      try{ await supabaseClient.from('notifications').insert({ recipient_id: fid, actor_id: currentUser.id, type: 'follow' }); }catch(e){ console.log('notif fail', e.message); }
    } 
    if(!stayInModal){
      await new Promise(r=>setTimeout(r,300));
      showProfile(fid);
    } else {
      if(btn){ btn.textContent = existing ? 'Follow' : 'Following ✓'; btn.disabled=false; btn.classList.remove('opacity-60'); }
    }
  }catch(e){
    console.error('Follow error:', e);
    alert('Follow failed: ' + e.message);
    if(btn){ btn.textContent=originalText; btn.disabled=false; btn.classList.remove('opacity-60'); }
  }
}

function showEditProfile(){ 
  if(!currentProfile) return; 
  showModal(`
    <h3 class="font-bold text-xl mb-4">Edit Profile</h3>
    <form onsubmit="handleEdit(event)" class="space-y-4">
      <div>
        <label class="block text-sm text-gray-400 mb-1">Bio</label>
        <textarea id="ebio" rows="3" class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3 focus:border-neon-cyan focus:outline-none">${currentProfile.bio||''}</textarea>
      </div>
      <div>
        <label class="block text-sm text-gray-400 mb-1">Avatar Image URL (paste a link to your image)</label>
        <input id="eav" type="url" placeholder="https://example.com/my-image.jpg" value="${currentProfile.avatar_url}" class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3 focus:border-neon-cyan focus:outline-none">
      </div>
      <button class="w-full py-3 bg-neon-cyan text-dark-900 font-bold rounded hover:bg-neon-green transition">Save Changes</button>
    </form>
    <div class="border-t border-white/10 mt-6 pt-4">
      <button onclick="deleteProfile()" class="w-full py-3 bg-red-500/20 text-red-400 font-bold rounded hover:bg-red-500/40 transition">Delete Profile</button>
    </div>
  `); 
}

async function deleteProfile() {
  if(!confirm('Are you sure you want to delete your profile? This cannot be undone.')) return;
  const userId = currentUser.id;
  await supabaseClient.from('profiles').update({ deleted_at: new Date().toISOString() }).eq('id', userId);
  await supabaseClient.from('videos').delete().eq('user_id', userId);
  await supabaseClient.from('comments').delete().eq('user_id', userId);
  await supabaseClient.from('likes').delete().eq('user_id', userId);
  await supabaseClient.from('followers').delete().or(`follower_id.eq.${userId},following_id.eq.${userId}`);
  await supabaseClient.from('notifications').delete().eq('recipient_id', userId).or(`actor_id.eq.${userId}`);
  await supabaseClient.auth.signOut();
  alert('Your profile and data have been successfully deleted.');
  window.location.reload();
}

async function handleEdit(e){ 
  e.preventDefault(); 
  const bio=document.getElementById('ebio').value.trim(); 
  const avatar_url=document.getElementById('eav').value.trim(); 
  const { error } = await supabaseClient.from('profiles').update({ bio, avatar_url }).eq('id',currentUser.id); 
  if(error) return alert(error.message); 
  closeModal(); await loadProfile(currentUser); showProfile(currentUser.id); 
}

// FIX 2 & 3: Updated Notifications UI to handle new_post and clickable follows
async function showNotifications(){ 
  if(!currentUser) return showLogin();
  const unreadIds = notifications.filter(n => !n.is_read).map(n => n.id);
  if(unreadIds.length > 0) {
    await supabaseClient.from('notifications').update({ is_read: true }).in('id', unreadIds);
    notifications.forEach(n => n.is_read = true);
    updateNotifBadge();
  }

  let html = `
    <div class="flex justify-between items-center mb-4">
      <h3 class="font-bold text-xl">Notifications</h3>
      ${notifications.length > 0 ? `<button onclick="clearNotifications()" class="text-xs text-red-400 hover:text-red-300 font-semibold">Clear All</button>` : ''}
    </div>
    <div class="space-y-2 text-sm">
  `;
  
  if(notifications.length === 0) {
    html += `<p class="text-gray-500 text-center py-4">No notifications yet.</p>`;
  } else {
    notifications.forEach(n => {
      const actor = usersCache[n.actor_id] || { username: 'Someone', avatar_url: '' };
      let message = '';
      let icon = '';
      let isClickable = false;
      let clickAction = '';
      
      if(n.type === 'like') { 
        message = `liked your video`; 
        icon = `<span class="text-neon-green">♥</span>`; 
        if(n.video_id) {
          const video = posts.find(p => p.id == n.video_id);
          if(video) message += `: "${video.title}"`;
          isClickable = true;
          clickAction = `onclick="closeModal(); showVideo('${n.video_id}')"`;
        }
      } else if(n.type === 'comment') { 
        message = `commented: "${n.content}"`; 
        icon = `<span class="text-neon-cyan">💬</span>`; 
        if(n.video_id) {
          const video = posts.find(p => p.id == n.video_id);
          if(video) message += ` on "${video.title}"`;
          isClickable = true;
          clickAction = `onclick="closeModal(); showVideo('${n.video_id}')"`;
        }
      } else if(n.type === 'new_post') {
        message = `posted a new video`;
        icon = `<span class="text-neon-green">🎥</span>`;
        if(n.video_id) {
          const video = posts.find(p => p.id == n.video_id);
          if(video) message += `: "${video.title}"`;
          isClickable = true;
          clickAction = `onclick="closeModal(); showVideo('${n.video_id}')"`;
        }
      } else if(n.type === 'follow') { 
        message = `started following you`; 
        icon = `<span class="text-neon-purple">👤</span>`; 
        isClickable = true;
        clickAction = `onclick="closeModal(); showProfile('${n.actor_id}')"`; // Takes you to their profile
      }
      
      const clickClass = isClickable ? 'cursor-pointer hover:bg-dark-600 transition' : '';
      
      html += `<div class="p-3 bg-dark-700 rounded flex items-center gap-3 ${!n.is_read ? 'border-l-4 border-neon-cyan' : ''} ${clickClass}" ${clickAction}>
        <img src="${actor.avatar_url||''}" class="w-8 h-8 rounded-full">
        <div class="flex-1"><span class="font-bold text-white">@${actor.username}</span> ${message}</div>
        <div class="text-lg">${icon}</div>
      </div>`;
    });
  }
  html += `</div>`;
  showModal(html); 
}
