<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

  <title>MusicNSports - Where Beats Meet Highlights</title>
  <meta name="description" content="Post music videos with sports visuals. Share your best NBA, NFL, Soccer highlights with Hip-Hop, Rock, EDM beats.">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            neon: { cyan: '#00F5FF', green: '#39FF14', purple: '#B026FF' },
            dark: { 900: '#0A0A0F', 800: '#12121A', 700: '#1A1A26', 600: '#252533' }
          },
          fontFamily: { sans: ['Inter','system-ui','sans-serif'], display: ['Outfit','sans-serif'] }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body { background: radial-gradient(ellipse at top, #12121A 0%, #0A0A0F 100%); min-height: 100vh; }
    .glass { background: rgba(26,26,38,0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
    .text-glow { text-shadow: 0 0 20px rgba(0,245,255,0.5); }
    .btn-glow:hover { box-shadow: 0 0 20px rgba(0,245,255,0.4), 0 0 40px rgba(57,255,20,0.2); }

</head>
<body class="text-gray-100 font-sans antialiased">
  <header class="sticky top-0 z-50 glass border-b border-white/5">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center gap-3 cursor-pointer" onclick="showMain()">
          <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-neon-cyan to-neon-purple flex items-center justify-center font-display font-black text-xl text-dark-900">M</div>
          <h1 class="font-display font-extrabold text-xl text-glow">MusicNSports</h1>
        </div>
        <div class="flex items-center gap-3">
          <button onclick="showNotifications()" class="relative p-2 rounded-lg hover:bg-white/5 transition">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0.538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
            <span class="absolute -top-1 -right-1 w-5 h-5 bg-neon-green text-dark-900 text-xs font-bold rounded-full flex items-center justify-center">3</span>
          </button>
          <div id="authSection"></div>
        </div>
      </div>
    </div>
  </header>

  <main id="mainContent" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8"></main>
  <div id="modalContainer"></div>

  <footer class="border-t border-white/5 py-8 text-center text-gray-500 text-sm">
    <p>© 2026 MusicNSports. Built for the culture.</p>
  </footer>

<script>
// ===== SUPABASE CONFIG - PASTE YOUR KEY HERE =====
const SUPABASE_URL = 'https://dsgilznlijicfwxgxilv.supabase.co';
const SUPABASE_ANON_KEY = 'PASTE_YOUR_ANON_KEY_HERE'; // Supabase Dashboard > Settings > API > anon public
let supabaseClient = null;
try {
  if (SUPABASE_ANON_KEY && SUPABASE_ANON_KEY !== 'PASTE_YOUR_ANON_KEY_HERE' && SUPABASE_ANON_KEY.startsWith('eyJ')) {
    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  }
} catch(e){ console.warn('Supabase init failed', e); }
const hasSupabase = !!supabaseClient;

// ===== STATE =====
let currentUser = null;
let currentProfile = null;
let usersCache = {};
let posts = [];
let likesMap = {};
let commentsMap = {};
let followsCache = {};

// ===== UTILS =====
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const uid = () => (crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2));
const getYouTubeId = url => { const m = url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/); return m ? m[1] : null; };
const getVimeoId = url => { const m = url.match(/vimeo\.com\/(\d+)/); return m ? m[1] : null; };
const getVideoId = url => getYouTubeId(url) || getVimeoId(url);
const thumbFromUrl = url => { const y=getYouTubeId(url); if(y) return `https://img.youtube.com/vi/${y}/mqdefault.jpg`; const v=getVimeoId(url); if(v) return `https://vumbnail.com/${v}.jpg`; return 'https://via.placeholder.com/320x180?text=Video'; };
const timeAgo = ts => { const d=new Date(ts); const s=Math.floor((Date.now()-d.getTime())/1000); if(s<60) return `${s}s ago`; const m=Math.floor(s/60); if(m<60) return `${m}m ago`; const h=Math.floor(m/60); if(h<24) return `${h}h ago`; const day=Math.floor(h/24); return `${day}d ago`; };

// ===== INIT - ALWAYS RENDERS UI FIRST =====
async function init(){
  showMain(); // Render immediately so you never get blank page
  renderAuth();
  if(hasSupabase){
    try{
      const { data:{session} } = await supabaseClient.auth.getSession();
      if(session?.user) await loadProfile(session.user);
      await loadAllData();
      supabaseClient.auth.onAuthStateChange(async (ev, sess)=>{
        if(sess?.user) await loadProfile(sess.user); else { currentUser=null; currentProfile=null; }
        renderAuth(); await loadAllData(); renderFeed();
      });
    }catch(e){ console.error('Supabase load error', e); }
  } else {
    // Fallback demo mode if key missing
    loadDemoIfEmpty();
  }
  renderAuth();
  renderFeed();
}

async function loadProfile(user){
  currentUser = user;
  try{
    let { data } = await supabaseClient.from('profiles').select('*').eq('id', user.id).single();
    if(!data){
      const username = user.email.split('@')[0].replace(/[^a-z0-9_]/gi,'');
      const { data: newP } = await supabaseClient.from('profiles').insert({ id:user.id, username, avatar_url:`https://api.dicebear.com/7.x/thumbs/svg?seed=${username}`, bio:'' }).select().single();
      data = newP;
    }
    currentProfile = data;
    if(data) usersCache[data.id]=data;
  }catch(e){ console.error(e); }
}

async function loadAllData(){
  if(!hasSupabase) return;
  try{
    const [{data:profiles},{data:videos},{data:likes},{data:comments},{data:follows}] = await Promise.all([
      supabaseClient.from('profiles').select('*'),
      supabaseClient.from('videos').select('*').order('created_at',{ascending:false}),
      supabaseClient.from('likes').select('*'),
      supabaseClient.from('comments').select('*'),
      supabaseClient.from('followers').select('*')
    ]);
    (profiles||[]).forEach(p=>usersCache[p.id]=p);
    posts = videos||[];
    likesMap={}; commentsMap={}; followsCache={};
    (likes||[]).forEach(l=>{ if(!likesMap[l.video_id]) likesMap[l.video_id]=[]; likesMap[l.video_id].push(l); });
    (comments||[]).forEach(c=>{ if(!commentsMap[c.video_id]) commentsMap[c.video_id]=[]; commentsMap[c.video_id].push(c); });
    (follows||[]).forEach(f=>{ if(!followsCache[f.follower_id]) followsCache[f.follower_id]={}; followsCache[f.follower_id][f.following_id]=true; });
    if(posts.length===0) loadDemoIfEmpty();
  }catch(e){ console.error('loadAllData failed', e); loadDemoIfEmpty(); }
}

function loadDemoIfEmpty(){
  if(posts.length>0) return;
  const demoId='demo-user-1';
  usersCache[demoId]={ id:demoId, username:'highlight_king', avatar_url:'https://api.dicebear.com/7.x/thumbs/svg?seed=highlight_king', bio:'Posting the best mixes daily.' };
  posts=[{ id:'demo-post-1', user_id:demoId, title:'Lebron James Top 10 Dunks on Trap Beat', video_url:'https://www.youtube.com/watch?v=dQw4w9WgXcQ', video_id:'dQw4w9WgXcQ', sport:'NBA', music:'Hip-Hop', description:'The king of the court meets the king of the beats.', thumbnail:'https://img.youtube.com/vi/dQw4w9WgXcQ/mqdefault.jpg', created_at:new Date(Date.now()-86400000).toISOString() }];
  likesMap['demo-post-1']=[]; commentsMap['demo-post-1']=[];
}

// ===== AUTH UI =====
function renderAuth(){
  const el=$('#authSection'); if(!el) return;
  if(currentUser && currentProfile){
    el.innerHTML=`<div class="flex items-center gap-3"><button onclick="showProfile('${currentUser.id}')" class="flex items-center gap-2 hover:bg-white/5 rounded-lg px-3 py-2"><img src="${currentProfile.avatar_url}" class="w-8 h-8 rounded-full"><span class="font-semibold hidden sm:block">@${currentProfile.username}</span></button><button onclick="logout()" class="text-gray-400 hover:text-white text-sm">Logout</button></div>`;
    const b=document.getElementById('uploadBtn'); if(b) b.classList.remove('hidden');
  }else{
    el.innerHTML=`<button onclick="showLogin()" class="px-4 py-2 text-gray-300 hover:text-white">Login</button><button onclick="showSignup()" class="px-4 py-2 bg-neon-cyan text-dark-900 font-semibold rounded-lg btn-glow">Sign Up</button>`;
    const b=document.getElementById('uploadBtn'); if(b) b.classList.add('hidden');
  }
}
async function logout(){ if(hasSupabase) await supabaseClient.auth.signOut(); currentUser=null; currentProfile=null; showMain(); renderAuth(); }

// ===== MODALS =====
function showModal(html, wide=false){ const c=$('#modalContainer'); c.innerHTML=`<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm" onclick="if(event.target===this) closeModal()"><div class="glass rounded-2xl p-6 w-full ${wide?'max-w-3xl':'max-w-md'} relative max-h-[90vh] overflow-y-auto"><button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>${html}</div></div>`; }
function closeModal(){ $('#modalContainer').innerHTML=''; }
function showSignup(){ showModal(`<h3 class="font-display font-bold text-2xl mb-6">Create Account</h3><form onsubmit="handleSignup(event)" class="space-y-4"><input id="su_email" type="email" placeholder="Email" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3 focus:border-neon-cyan focus:outline-none"><input id="su_username" type="text" placeholder="Username" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3"><input id="su_password" type="password" placeholder="Password" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3"><button class="w-full py-3 bg-gradient-to-r from-neon-cyan to-neon-green text-dark-900 font-bold rounded-lg">Sign Up</button><p class="text-center text-gray-400 text-sm">Have account? <button type="button" onclick="closeModal();showLogin()" class="text-neon-cyan">Login</button></p></form>`); }
async function handleSignup(e){ e.preventDefault(); const email=document.getElementById('su_email').value.trim(); const username=document.getElementById('su_username').value.trim().replace(/\s+/g,'_'); const password=document.getElementById('su_password').value; if(!hasSupabase) return alert('Paste your Supabase anon key at top of file first.'); const { data: ex } = await supabaseClient.from('profiles').select('id').eq('username',username).maybeSingle(); if(ex) return alert('Username taken'); const { data, error } = await supabaseClient.auth.signUp({ email, password }); if(error) return alert(error.message); if(data.user){ await supabaseClient.from('profiles').insert({ id:data.user.id, username, avatar_url:`https://api.dicebear.com/7.x/thumbs/svg?seed=${username}`, bio:'' }); closeModal(); alert('Account created! If confirmation is on check email, then Login.'); } }
function showLogin(){ showModal(`<h3 class="font-display font-bold text-2xl mb-6">Welcome Back</h3><form onsubmit="handleLogin(event)" class="space-y-4"><input id="li_email" type="email" placeholder="Email" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3"><input id="li_password" type="password" placeholder="Password" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3"><button class="w-full py-3 bg-gradient-to-r from-neon-cyan to-neon-green text-dark-900 font-bold rounded-lg">Login</button></form>`); }
async function handleLogin(e){ e.preventDefault(); if(!hasSupabase) return alert('Add anon key first'); const email=document.getElementById('li_email').value.trim(); const password=document.getElementById('li_password').value; const { error } = await supabaseClient.auth.signInWithPassword({ email, password }); if(error) return alert(error.message); closeModal(); }

// ===== MAIN + FEED =====
function showMain(){
  document.getElementById('mainContent').innerHTML=`
    <section class="text-center mb-12"><h2 class="font-display font-black text-4xl md:text-6xl mb-4 bg-gradient-to-r from-neon-cyan via-neon-green to-neon-purple bg-clip-text text-transparent">Where Beats Meet Highlights</h2><p class="text-gray-400 text-lg max-w-2xl mx-auto mb-8">Post your fire sports edits. Match NBA dunks with Hip-Hop. UFC KOs with EDM. Soccer bangers with Rock.</p><button id="uploadBtn" onclick="openUploadModal()" class="px-8 py-4 bg-gradient-to-r from-neon-cyan to-neon-green text-dark-900 font-bold rounded-xl btn-glow hover:scale-105 transition ${!currentUser?'hidden':''}">Post Your Mix</button></section>
    <section class="glass rounded-2xl p-4 mb-8 sticky top-20 z-40"><div class="grid grid-cols-1 md:grid-cols-5 gap-3"><input id="searchInput" type="text" placeholder="Search title, user, or description..." class="md:col-span-2 bg-dark-700 border border-white/10 rounded-lg px-4 py-2 focus:outline-none focus:border-neon-cyan"><select id="sportFilter" class="bg-dark-700 border border-white/10 rounded-lg px-4 py-2"><option value="all">All Sports</option><option>NBA</option><option>NFL</option><option>Soccer</option><option>UFC</option><option>Other</option></select><select id="musicFilter" class="bg-dark-700 border border-white/10 rounded-lg px-4 py-2"><option value="all">All Music</option><option>Hip-Hop</option><option>Rock</option><option>EDM</option><option>Pop</option><option>Other</option></select><select id="sortFilter" class="bg-dark-700 border border-white/10 rounded-lg px-4 py-2"><option value="newest">Newest</option><option value="likes">Most Liked</option><option value="comments">Most Commented</option></select></div></section>
    <section id="videoGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-16"></section>
    <section class="glass rounded-2xl p-8 mb-8"><h3 class="font-display font-bold text-2xl mb-4 text-neon-cyan">Community Guidelines</h3><div class="space-y-2 text-sm text-gray-300"><p><strong class="text-white">1. Keep it Sports + Music:</strong> All posts must pair sports with music.</p><p><strong class="text-white">2. No Hate:</strong> Respect athletes, artists, users.</p><p><strong class="text-white">3. Own Your Content:</strong> Only post what you have rights to share.</p><p><strong class="text-white">4. NSFW = Ban:</strong> No nudity or graphic violence.</p><p><strong class="text-white">5. No Spam:</strong> One video, one post.</p></div></section>
    <section class="glass rounded-2xl p-8 mb-16"><h3 class="font-display font-bold text-2xl mb-6 text-neon-green">FAQ</h3><div class="space-y-4"><div><h4 class="font-semibold text-white">Is the website free to use?</h4><p class="text-gray-400">YES. Absolutely FREE.</p></div><div><h4 class="font-semibold text-white">What types of videos can I post?</h4><p class="text-gray-400">Any sports related content with music. From the most popular sports to dance competitions and hot dog eating contests. Anything recognized as a sport.</p></div><div><h4 class="font-semibold text-white">Do I need to upload files?</h4><p class="text-gray-400">No, just paste YouTube or Vimeo link.</p></div><div><h4 class="font-semibold text-white">Can I post the same video twice?</h4><p class="text-gray-400">No, duplicates are blocked.</p></div></div></section>`;
  document.getElementById('searchInput')?.addEventListener('input', renderFeed);
  document.getElementById('sportFilter')?.addEventListener('change', renderFeed);
  document.getElementById('musicFilter')?.addEventListener('change', renderFeed);
  document.getElementById('sortFilter')?.addEventListener('change', renderFeed);
  renderFeed(); renderAuth();
}
function renderFeed(){
  const grid=document.getElementById('videoGrid'); if(!grid) return;
  const s=(document.getElementById('searchInput')?.value||'').toLowerCase(); const sport=document.getElementById('sportFilter')?.value||'all'; const music=document.getElementById('musicFilter')?.value||'all'; const sort=document.getElementById('sortFilter')?.value||'newest';
  let f=posts.filter(p=>{ const u=usersCache[p.user_id]; const ms=!s||p.title?.toLowerCase().includes(s)||p.description?.toLowerCase().includes(s)||u?.username?.toLowerCase().includes(s); return ms && (sport==='all'||p.sport===sport) && (music==='all'||p.music===music); });
  if(sort==='likes') f.sort((a,b)=>(likesMap[b.id]?.length||0)-(likesMap[a.id]?.length||0)); else if(sort==='comments') f.sort((a,b)=>(commentsMap[b.id]?.length||0)-(commentsMap[a.id]?.length||0)); else f.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  if(f.length===0){ grid.innerHTML=`<div class="col-span-full text-center py-20 text-gray-500">No posts yet. ${currentUser?'Be the first to post!':'Login to post!'}</div>`; return; }
  grid.innerHTML=f.map(p=>{ const u=usersCache[p.user_id]||{username:'user',avatar_url:''}; const lc=likesMap[p.id]?.length||0; const cc=commentsMap[p.id]?.length||0; const liked=currentUser&&likesMap[p.id]?.some(l=>l.user_id===currentUser.id); return `<article class="glass rounded-2xl overflow-hidden hover:scale-[1.02] transition"><div class="aspect-video bg-dark-800 relative cursor-pointer" onclick="showVideo('${p.id}')"><img src="${p.thumbnail||thumbFromUrl(p.video_url)}" class="w-full h-full object-cover"><div class="absolute inset-0 bg-gradient-to-t from-dark-900/80 to-transparent"></div><div class="absolute bottom-3 left-3 flex gap-2"><span class="px-2 py-1 bg-neon-cyan/20 border border-neon-cyan/40 rounded text-xs font-semibold">${p.sport}</span><span class="px-2 py-1 bg-neon-purple/20 border border-neon-purple/40 rounded text-xs font-semibold">${p.music}</span></div></div><div class="p-4"><h3 class="font-bold text-lg mb-1 line-clamp-2">${p.title}</h3><p class="text-gray-400 text-sm mb-3 line-clamp-2">${p.description||''}</p><div class="flex items-center justify-between"><button onclick="showProfile('${p.user_id}')" class="flex items-center gap-2"><img src="${u.avatar_url}" class="w-7 h-7 rounded-full"><span class="text-sm text-gray-300">@${u.username}</span></button><div class="flex gap-3 text-sm text-gray-400"><button onclick="event.stopPropagation();toggleLike('${p.id}')" class="${liked?'text-neon-green':''} flex items-center gap-1">♥ ${lc}</button><span>💬 ${cc}</span></div></div></div></article>`; }).join('');
}

// ===== UPLOAD / LIKE / COMMENT / PROFILE (SUPABASE) =====
function openUploadModal(){ if(!currentUser) return showLogin(); showModal(`<h3 class="font-display font-bold text-2xl mb-6">Post Your Mix</h3><form onsubmit="handleUpload(event)" class="space-y-4"><input id="up_title" type="text" placeholder="Title" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3"><input id="up_url" type="url" placeholder="YouTube or Vimeo URL" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3"><select id="up_sport" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3"><option value="">Sport</option><option>NBA</option><option>NFL</option><option>Soccer</option><option>UFC</option><option>Other</option></select><select id="up_music" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3"><option value="">Music</option><option>Hip-Hop</option><option>Rock</option><option>EDM</option><option>Pop</option><option>Other</option></select><textarea id="up_desc" rows="3" placeholder="Description" class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3"></textarea><button class="w-full py-3 bg-gradient-to-r from-neon-cyan to-neon-green text-dark-900 font-bold rounded-lg">Post Mix</button></form>`); }
async function handleUpload(e){ e.preventDefault(); const title=document.getElementById('up_title').value.trim(); const video_url=document.getElementById('up_url').value.trim(); const sport=document.getElementById('up_sport').value; const music=document.getElementById('up_music').value; const description=document.getElementById('up_desc').value.trim(); const video_id=getVideoId(video_url); if(!video_id) return alert('Invalid URL'); if(!hasSupabase) return alert('Add Supabase key first'); const { data:dup } = await supabaseClient.from('videos').select('id').eq('user_id',currentUser.id).eq('video_id',video_id); if(dup&&dup.length>0) return alert('Already posted!'); const { error } = await supabaseClient.from('videos').insert({ user_id:currentUser.id, title, video_url, video_id, sport, music, description, thumbnail:thumbFromUrl(video_url) }); if(error) return alert(error.message); closeModal(); await loadAllData(); showMain(); }
async function toggleLike(id){ if(!currentUser) return showLogin(); if(id.startsWith('demo-')) return alert('Demo post - post a real video first!'); const ex=likesMap[id]?.find(l=>l.user_id===currentUser.id); if(ex){ await supabaseClient.from('likes').delete().eq('id',ex.id); } else { await supabaseClient.from('likes').insert({ user_id:currentUser.id, video_id:id }); } await loadAllData(); renderFeed(); }
async function showVideo(id){ const p=posts.find(x=>x.id===id); if(!p) return; const u=usersCache[p.user_id]||{}; const isYt=getYouTubeId(p.video_url); const embed=isYt?`https://www.youtube.com/embed/${p.video_id}?autoplay=1`:`https://player.vimeo.com/video/${p.video_id}?autoplay=1`; let comments=[]; if(!id.startsWith('demo-') && hasSupabase){ const { data } = await supabaseClient.from('comments').select('*, profiles(username,avatar_url)').eq('video_id',id).order('created_at',{ascending:true}); comments=data||[]; } const lc=likesMap[id]?.length||0; const liked=currentUser&&likesMap[id]?.some(l=>l.user_id===currentUser.id); showModal(`<div class="space-y-4"><div class="aspect-video bg-black rounded-xl overflow-hidden"><iframe src="${embed}" class="w-full h-full" frameborder="0" allowfullscreen></iframe></div><div class="flex justify-between items-center"><h3 class="font-bold text-xl">${p.title}</h3><button onclick="toggleLike('${id}')" class="px-3 py-1 rounded ${liked?'bg-neon-green text-dark-900':'bg-dark-700'}">${liked?'♥ Liked':'♡ Like'} ${lc}</button></div><p class="text-gray-400 text-sm">${p.description||''}</p><div class="border-t border-white/10 pt-4"><h4 class="font-semibold mb-3">Comments (${comments.length})</h4><div class="space-y-3 mb-4 max-h-60 overflow-y-auto">${comments.map(c=>{ const cu=c.profiles||usersCache[c.user_id]||{}; return `<div class="flex gap-2"><img src="${cu.avatar_url||''}" class="w-8 h-8 rounded-full"><div class="bg-dark-700 rounded px-3 py-2 flex-1"><div class="flex justify-between"><b class="text-sm">@${cu.username||'user'}</b><span class="text-xs text-gray-500">${timeAgo(c.created_at)}</span></div><p class="text-sm">${c.content}</p>${currentUser?.id===c.user_id?`<button onclick="deleteComment('${c.id}','${id}')" class="text-xs text-red-400">Delete</button>`:''}</div></div>`}).join('')||'<p class="text-gray-500 text-sm">No comments</p>'}</div>${currentUser?`<form onsubmit="addComment(event,'${id}')" class="flex gap-2"><input id="cInput" required placeholder="Add comment..." class="flex-1 bg-dark-700 border border-white/10 rounded-lg px-4 py-2"><button class="px-4 py-2 bg-neon-cyan text-dark-900 font-bold rounded">Post</button></form>`:'<p class="text-sm text-gray-500">Login to comment</p>'}</div></div>`, true); }
async function addComment(e,id){ e.preventDefault(); if(!hasSupabase) return; const content=document.getElementById('cInput').value.trim(); if(!content) return; const { error } = await supabaseClient.from('comments').insert({ user_id:currentUser.id, video_id:id, content }); if(error) return alert(error.message); showVideo(id); await loadAllData(); }
async function deleteComment(cid,vid){ if(!confirm('Delete?')) return; await supabaseClient.from('comments').delete().eq('id',cid); showVideo(vid); await loadAllData(); }
async function showProfile(uid){ let prof=usersCache[uid]; if(!prof && hasSupabase){ const { data } = await supabaseClient.from('profiles').select('*').eq('id',uid).single(); prof=data; } if(!prof) return; let userPosts=[]; let followers=[]; let following=[]; let isFollowing=false; if(hasSupabase && !uid.startsWith('demo-')){ const { data: v } = await supabaseClient.from('videos').select('*').eq('user_id',uid).order('created_at',{ascending:false}); userPosts=v||[]; const { data: f1 } = await supabaseClient.from('followers').select('*').eq('following_id',uid); followers=f1||[]; const { data: f2 } = await supabaseClient.from('followers').select('*').eq('follower_id',uid); following=f2||[]; if(currentUser){ const { data } = await supabaseClient.from('followers').select('*').eq('follower_id',currentUser.id).eq('following_id',uid).maybeSingle(); isFollowing=!!data; } } else { userPosts=posts.filter(p=>p.user_id===uid); } const isOwn=currentUser?.id===uid; document.getElementById('mainContent').innerHTML=`<div class="max-w-4xl mx-auto"><button onclick="showMain()" class="mb-6 text-gray-400 hover:text-white">← Back</button><div class="glass rounded-2xl p-8 mb-8"><div class="flex gap-6"><img src="${prof.avatar_url}" class="w-24 h-24 rounded-full border-4 border-neon-cyan/30"><div><div class="flex items-center gap-3 mb-2"><h2 class="text-3xl font-bold">@${prof.username}</h2>${currentUser&&!isOwn?`<button onclick="toggleFollow('${uid}')" class="px-4 py-2 ${isFollowing?'bg-dark-600':'bg-neon-cyan text-dark-900'} rounded text-sm font-semibold">${isFollowing?'Unfollow':'Follow'}</button>`:''}${isOwn?`<button onclick="showEditProfile()" class="px-4 py-2 bg-dark-600 rounded text-sm">Edit</button>`:''}</div><p class="text-gray-400 mb-3">${prof.bio||'No bio'}</p><div class="flex gap-6 text-sm"><span><b>${userPosts.length}</b> Posts</span><span><b>${followers.length}</b> Followers</span><span><b>${following.length}</b> Following</span></div></div></div></div><div class="grid grid-cols-1 md:grid-cols-3 gap-6">${userPosts.map(p=>`<article class="glass rounded-2xl overflow-hidden cursor-pointer" onclick="showVideo('${p.id}')"><div class="aspect-video bg-dark-800"><img src="${p.thumbnail||thumbFromUrl(p.video_url)}" class="w-full h-full object-cover"></div><div class="p-4"><h3 class="font-bold line-clamp-2">${p.title}</h3><p class="text-xs text-gray-500">${timeAgo(p.created_at)}</p>${isOwn?`<button onclick="event.stopPropagation();deletePost('${p.id}')" class="text-xs text-red-400 mt-2">Delete</button>`:''}</div></article>`).join('')||'<p class="col-span-full text-center text-gray-500 py-20">No posts</p>'}</div></div>`; }
async function toggleFollow(fid){ if(!currentUser) return showLogin(); if(!hasSupabase) return; const { data } = await supabaseClient.from('followers').select('*').eq('follower_id',currentUser.id).eq('following_id',fid).maybeSingle(); if(data) await supabaseClient.from('followers').delete().eq('id',data.id); else await supabaseClient.from('followers').insert({ follower_id:currentUser.id, following_id:fid }); await loadAllData(); showProfile(fid); }
async function deletePost(id){ if(!confirm('Delete?')) return; if(!hasSupabase) return; await supabaseClient.from('videos').delete().eq('id',id); await loadAllData(); showProfile(currentUser.id); }
function showEditProfile(){ if(!currentProfile) return; showModal(`<h3 class="font-bold text-xl mb-4">Edit Profile</h3><form onsubmit="handleEdit(event)" class="space-y-3"><textarea id="ebio" rows="3" class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3">${currentProfile.bio||''}</textarea><input id="eav" type="url" value="${currentProfile.avatar_url}" class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3"><button class="w-full py-3 bg-neon-cyan text-dark-900 font-bold rounded">Save</button></form>`); }
async function handleEdit(e){ e.preventDefault(); const bio=document.getElementById('ebio').value.trim(); const avatar_url=document.getElementById('eav').value.trim(); const { error } = await supabaseClient.from('profiles').update({ bio, avatar_url }).eq('id',currentUser.id); if(error) return alert(error.message); closeModal(); await loadProfile(currentUser); showProfile(currentUser.id); }
function showNotifications(){ showModal(`<h3 class="font-bold text-xl mb-4">Notifications</h3><div class="space-y-2 text-sm"><div class="p-3 bg-dark-700 rounded">@hooper liked your mix</div><div class="p-3 bg-dark-700 rounded">@edmfan commented: fire edit</div></div>`); }

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
