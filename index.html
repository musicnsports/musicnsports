<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MusicNSports - Where Beats Meet Highlights</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
  <style>body{background:radial-gradient(ellipse at top,#12121A 0%,#0A0A0F 100%);min-height:100vh}.glass{background:rgba(26,26,38,0.6);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08)}.text-glow{text-shadow:0 0 20px rgba(0,245,255,0.5)}.btn-glow:hover{box-shadow:0 0 20px rgba(0,245,255,0.4),0 0 40px rgba(57,255,20,0.2)}.line-clamp-2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}</style>
</head>
<body class="text-gray-100 font-sans antialiased">
<header class="sticky top-0 z-50 glass border-b border-white/5">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8"><div class="flex items-center justify-between h-16">
    <div class="flex items-center gap-3 cursor-pointer" onclick="showMain()"><div class="w-10 h-10 rounded-lg bg-gradient-to-br from-neon-cyan to-neon-purple flex items-center justify-center font-black text-xl text-dark-900">M</div><h1 class="font-extrabold text-xl text-glow">MusicNSports</h1></div>
    <div class="flex items-center gap-3">
      <button onclick="showNotifications()" class="relative p-2 rounded-lg hover:bg-white/5"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0.538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg><span id="notifBadge" class="absolute -top-1 -right-1 w-5 h-5 bg-neon-green text-dark-900 text-xs font-bold rounded-full flex items-center justify-center hidden">0</span></button>
      <div id="authSection"></div>
    </div>
  </div></div>
</header>
<main id="mainContent" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8"></main>
<div id="modalContainer"></div>
<footer class="border-t border-white/5 py-8 text-center text-gray-500 text-sm"><p>© 2026 MusicNSports. Built for the culture.</p></footer>

<script>
// ===== SUPABASE =====
const SUPABASE_URL='https://dsgilznlijicfwxgxilv.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRzZ2lsem5saWppY2Z3eGd4aWx2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5MDEzNjIsImV4cCI6MjA5OTQ3NzM2Mn0.y0pvBThvU6YX3x-nqJj3Aow_YLPWb-b-3Yw9EezUtGA';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ===== STATE =====
let currentUser=null, currentProfile=null, usersCache={}, posts=[], likesMap={}, commentsMap={}, commentLikesMap={}, followsCache={}, notifications=[], replyingTo=null;

// ===== UTILS =====
const $=s=>document.querySelector(s);
const getYouTubeId=url=>{const m=url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/);return m?m[1]:null;};
const getVimeoId=url=>{const m=url.match(/vimeo\.com\/(\d+)/);return m?m[1]:null;};
const getVideoId=url=>getYouTubeId(url)||getVimeoId(url);
const thumbFromUrl=url=>{const y=getYouTubeId(url);if(y) return `https://img.youtube.com/vi/${y}/mqdefault.jpg`; const v=getVimeoId(url); if(v) return `https://vumbnail.com/${v}.jpg`; return 'https://via.placeholder.com/640x360?text=Video';};
const timeAgo=ts=>{const d=new Date(ts);const s=Math.floor((Date.now()-d.getTime())/1000);if(s<60)return `${s}s ago`;const m=Math.floor(s/60);if(m<60)return `${m}m ago`;const h=Math.floor(m/60);if(h<24)return `${h}h ago`;return `${Math.floor(h/24)}d ago`;};

// ===== INIT =====
async function init(){
  const hashParams=new URLSearchParams(window.location.hash.substring(1));
  if(hashParams.get('type')==='recovery'){ showResetPasswordPage(); return; }
  showMain(); renderAuth();
  try{
    const {data:{session}}=await supabaseClient.auth.getSession();
    if(session?.user){ await loadProfile(session.user); await loadNotifications(); }
    await loadAllData();
    const params=new URLSearchParams(window.location.search);
    const v=params.get('v'), u=params.get('u');
    if(v) setTimeout(()=>showVideo(v),500);
    else if(u) setTimeout(()=>showProfile(u),500);
    supabaseClient.auth.onAuthStateChange(async (ev,sess)=>{
      if(sess?.user){ await loadProfile(sess.user); await loadNotifications(); } else { currentUser=null; currentProfile=null; notifications=[]; updateNotifBadge(); }
      renderAuth(); await loadAllData(); renderFeed();
    });
  }catch(e){ console.error('Init error',e); }
  renderAuth(); renderFeed();
}
async function loadProfile(user){
  currentUser=user;
  try{
    let {data}=await supabaseClient.from('profiles').select('*').eq('id',user.id).single();
    if(!data){
      const username=user.user_metadata?.username||user.email.split('@')[0].replace(/[^a-z0-9_]/gi,'');
      const {data:newP}=await supabaseClient.from('profiles').insert({id:user.id,username,avatar_url:`https://api.dicebear.com/7.x/thumbs/svg?seed=${username}`,bio:''}).select().single();
      data=newP;
    }
    currentProfile=data; if(data) usersCache[data.id]=data;
  }catch(e){ console.error(e); }
}
async function loadAllData(){
  try{
    const [{data:profiles},{data:videos},{data:likes},{data:comments},{data:follows},{data:cLikes}] = await Promise.all([
      supabaseClient.from('profiles').select('*'),
      supabaseClient.from('videos').select('*').order('created_at',{ascending:false}),
      supabaseClient.from('likes').select('*'),
      supabaseClient.from('comments').select('*').order('created_at',{ascending:true}),
      supabaseClient.from('followers').select('*'),
      supabaseClient.from('comment_likes').select('*')
    ]);
    (profiles||[]).forEach(p=>usersCache[p.id]=p);
    posts=videos||[];
    likesMap={}; commentsMap={}; followsCache={}; commentLikesMap={};
    (likes||[]).forEach(l=>{ if(!likesMap[l.video_id]) likesMap[l.video_id]=[]; likesMap[l.video_id].push(l); });
    (comments||[]).forEach(c=>{ if(!commentsMap[c.video_id]) commentsMap[c.video_id]=[]; commentsMap[c.video_id].push(c); });
    (follows||[]).forEach(f=>{ if(!followsCache[f.follower_id]) followsCache[f.follower_id]={}; followsCache[f.follower_id][f.following_id]=true; });
    (cLikes||[]).forEach(l=>{ if(!commentLikesMap[l.comment_id]) commentLikesMap[l.comment_id]=[]; commentLikesMap[l.comment_id].push(l); });
    if(posts.length===0){
      const demoId='demo-user-1'; usersCache[demoId]={id:demoId,username:'highlight_king',avatar_url:'https://api.dicebear.com/7.x/thumbs/svg?seed=highlight_king',bio:'Posting the best mixes daily.'};
      posts=[{id:'demo-post-1',user_id:demoId,title:'Lebron James Top 10 Dunks on Trap Beat',video_url:'https://www.youtube.com/watch?v=dQw4w9WgXcQ',video_id:'dQw4w9WgXcQ',sport:'NBA',music:'Hip-Hop',description:'The king of the court meets the king of the beats.',thumbnail:'https://img.youtube.com/vi/dQw4w9WgXcQ/mqdefault.jpg',created_at:new Date().toISOString()}];
      likesMap['demo-post-1']=[]; commentsMap['demo-post-1']=[];
    }
  }catch(e){ console.error('loadAllData',e); }
}
async function loadNotifications(){
  if(!currentUser) return;
  try{
    const {data}=await supabaseClient.from('notifications').select('*').eq('recipient_id',currentUser.id).order('created_at',{ascending:false}).limit(30);
    notifications=data||[]; updateNotifBadge();
  }catch(e){ console.log('notifications table missing?',e.message); }
}
function updateNotifBadge(){
  const b=$('#notifBadge'); if(!b) return;
  const unread=notifications.filter(n=>!n.is_read).length;
  if(unread>0){ b.textContent=unread>9?'9+':unread; b.classList.remove('hidden'); } else b.classList.add('hidden');
}
async function createNotification(recipientId,type,videoId=null,content='',commentId=null){
  if(!currentUser||recipientId===currentUser.id) return;
  try{
    await supabaseClient.from('notifications').insert({recipient_id:recipientId,actor_id:currentUser.id,type,video_id:videoId,content:content?.slice(0,200),comment_id:commentId});
  }catch(e){ console.log('notif insert failed',e.message); }
}

// ===== AUTH =====
function renderAuth(){
  const el=$('#authSection'); if(!el) return;
  if(currentUser&&currentProfile){
    el.innerHTML=`<div class="flex items-center gap-3"><button onclick="showProfile('${currentUser.id}')" class="flex items-center gap-2 hover:bg-white/5 rounded-lg px-3 py-2"><img src="${currentProfile.avatar_url}" class="w-8 h-8 rounded-full"><span class="font-semibold hidden sm:block">@${currentProfile.username}</span></button><button onclick="logout()" class="text-gray-400 hover:text-white text-sm">Logout</button></div>`;
    const b=document.getElementById('uploadBtn'); if(b) b.classList.remove('hidden');
  }else{
    el.innerHTML=`<button onclick="showLogin()" class="px-4 py-2 text-gray-300 hover:text-white">Login</button><button onclick="showSignup()" class="px-4 py-2 bg-neon-cyan text-dark-900 font-semibold rounded-lg btn-glow">Sign Up</button>`;
    const b=document.getElementById('uploadBtn'); if(b) b.classList.add('hidden');
  }
}
async function logout(){ await supabaseClient.auth.signOut(); currentUser=null; currentProfile=null; showMain(); }
function showModal(html,wide=false){ $('#modalContainer').innerHTML=`<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm" onclick="if(event.target===this) closeModal()"><div class="glass rounded-2xl p-6 w-full ${wide?'max-w-3xl':'max-w-md'} relative max-h-[90vh] overflow-y-auto"><button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white">✕</button>${html}</div></div>`; }
function closeModal(){ $('#modalContainer').innerHTML=''; }
function showSignup(){ showModal(`<h3 class="font-bold text-2xl mb-6">Create Account</h3><form onsubmit="handleSignup(event)" class="space-y-4"><input id="su_email" type="email" placeholder="Email" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3"><input id="su_username" type="text" placeholder="Username" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3"><input id="su_password" type="password" placeholder="Password" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3"><button class="w-full py-3 bg-gradient-to-r from-neon-cyan to-neon-green text-dark-900 font-bold rounded-lg">Sign Up Free</button><p class="text-center text-sm text-gray-400">Have account? <button type="button" onclick="closeModal();showLogin()" class="text-neon-cyan">Login</button></p></form>`); }
async function handleSignup(e){ e.preventDefault(); const email=document.getElementById('su_email').value.trim(); const username=document.getElementById('su_username').value.trim().replace(/\s+/g,'_'); const password=document.getElementById('su_password').value; const {data:ex}=await supabaseClient.from('profiles').select('id').eq('username',username).maybeSingle(); if(ex) return alert('Username taken'); const {data,error}=await supabaseClient.auth.signUp({email,password,options:{data:{username}}}); if(error) return alert(error.message); if(data.user){ await supabaseClient.from('profiles').insert({id:data.user.id,username,avatar_url:`https://api.dicebear.com/7.x/thumbs/svg?seed=${username}`,bio:''}); closeModal(); alert('Account created! You are logged in.'); } }
function showLogin(){ showModal(`<h3 class="font-bold text-2xl mb-6">Welcome Back</h3><form onsubmit="handleLogin(event)" class="space-y-4"><input id="li_email" type="email" placeholder="Email" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3"><input id="li_password" type="password" placeholder="Password" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3"><button class="w-full py-3 bg-gradient-to-r from-neon-cyan to-neon-green text-dark-900 font-bold rounded-lg">Login</button><p class="text-center text-sm text-gray-400"><button type="button" onclick="closeModal();showForgotPassword()" class="text-neon-cyan">Forgot Password?</button> • <button type="button" onclick="closeModal();showSignup()" class="text-neon-cyan">Sign Up</button></p></form>`); }
async function handleLogin(e){ e.preventDefault(); const email=document.getElementById('li_email').value.trim(); const password=document.getElementById('li_password').value; const {error}=await supabaseClient.auth.signInWithPassword({email,password}); if(error) return alert(error.message); closeModal(); }
function showForgotPassword(){ showModal(`<h3 class="font-bold text-2xl mb-6">Reset Password</h3><form onsubmit="handleForgotPassword(event)" class="space-y-4"><input id="fp_email" type="email" placeholder="Enter your email" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3"><button class="w-full py-3 bg-neon-cyan text-dark-900 font-bold rounded-lg">Send Reset Link</button></form>`); }
async function handleForgotPassword(e){ e.preventDefault(); const email=document.getElementById('fp_email').value.trim(); const {error}=await supabaseClient.auth.resetPasswordForEmail(email,{redirectTo:window.location.origin+window.location.pathname}); if(error) return alert(error.message); alert('Reset link sent! Check inbox.'); closeModal(); }
function showResetPasswordPage(){ document.getElementById('mainContent').innerHTML=`<div class="max-w-md mx-auto mt-20"><div class="glass rounded-2xl p-8 text-center"><h2 class="font-bold text-3xl mb-6 text-neon-cyan">Set New Password</h2><form onsubmit="handleUpdatePassword(event)" class="space-y-4"><input id="new_pass" type="password" placeholder="New Password (6+ chars)" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3"><input id="new_pass2" type="password" placeholder="Confirm Password" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3"><button class="w-full py-3 bg-gradient-to-r from-neon-cyan to-neon-green text-dark-900 font-bold rounded-lg">Update Password</button></form></div></div>`; }
async function handleUpdatePassword(e){ e.preventDefault(); const p1=document.getElementById('new_pass').value; const p2=document.getElementById('new_pass2').value; if(p1!==p2) return alert('Passwords do not match'); const {error}=await supabaseClient.auth.updateUser({password:p1}); if(error) return alert(error.message); alert('Password updated!'); window.location.href=window.location.pathname; }

// ===== FEED =====
function showMain(){
  let banner=''; if(!currentUser){ banner=`<div class="glass rounded-xl p-4 mb-6 flex flex-col sm:flex-row items-center justify-between gap-4 border border-neon-cyan/30"><p class="text-gray-200"><span class="font-bold text-neon-cyan">Want to post your own mix?</span> Join free!</p><button onclick="showSignup()" class="px-6 py-2 bg-neon-cyan text-dark-900 font-bold rounded-lg">Sign Up Free</button></div>`; }
  document.getElementById('mainContent').innerHTML=banner+`
    <section class="text-center mb-12"><h2 class="font-black text-4xl md:text-6xl mb-4 bg-gradient-to-r from-neon-cyan via-neon-green to-neon-purple bg-clip-text text-transparent">Where Beats Meet Highlights</h2><p class="text-gray-400 max-w-2xl mx-auto mb-8">NBA dunks with Hip-Hop. UFC KOs with EDM. Soccer bangers with Rock.</p><button id="uploadBtn" onclick="openUploadModal()" class="px-8 py-4 bg-gradient-to-r from-neon-cyan to-neon-green text-dark-900 font-bold rounded-xl btn-glow ${!currentUser?'hidden':''}">Post Your Mix</button></section>
    <section class="glass rounded-2xl p-4 mb-8 sticky top-20 z-40"><div class="grid grid-cols-1 md:grid-cols-5 gap-3"><input id="searchInput" type="text" placeholder="Search..." class="md:col-span-2 bg-dark-700 border border-white/10 rounded-lg px-4 py-2 focus:border-neon-cyan focus:outline-none"><select id="sportFilter" class="bg-dark-700 border border-white/10 rounded-lg px-4 py-2"><option value="all">All Sports</option><option>NBA</option><option>NFL</option><option>Soccer</option><option>UFC</option><option>Other</option></select><select id="musicFilter" class="bg-dark-700 border border-white/10 rounded-lg px-4 py-2"><option value="all">All Music</option><option>Hip-Hop</option><option>Rock</option><option>EDM</option><option>Pop</option></select><select id="sortFilter" class="bg-dark-700 border border-white/10 rounded-lg px-4 py-2"><option value="newest">Newest</option><option value="likes">Most Liked</option><option value="comments">Most Commented</option></select></div></section>
    <section id="videoGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-16"></section>
    <section class="glass rounded-2xl p-8 mb-8"><h3 class="font-bold text-2xl mb-4 text-neon-cyan">Community Guidelines</h3><div class="space-y-2 text-sm text-gray-300"><p><strong class="text-white">1. Sports + Music only</strong> - All posts must pair both.</p><p><strong class="text-white">2. Respect</strong> - No hate or harassment.</p><p><strong class="text-white">3. Own content</strong> - Only share what you own.</p><p><strong class="text-white">4. No NSFW</strong></p><p><strong class="text-white">5. No Spam</strong></p></div></section>
    <section class="glass rounded-2xl p-8 mb-16"><h3 class="font-bold text-2xl mb-6 text-neon-green">FAQ</h3><div class="space-y-3 text-sm"><div><b class="text-white">Is it free?</b><p class="text-gray-400">YES. Absolutely FREE.</p></div><div><b class="text-white">What can I post?</b><p class="text-gray-400">Any sport with music - NBA, NFL, dance, hot dog contests, anything competitive.</p></div></div></section>`;
  document.getElementById('searchInput')?.addEventListener('input',renderFeed);
  document.getElementById('sportFilter')?.addEventListener('change',renderFeed);
  document.getElementById('musicFilter')?.addEventListener('change',renderFeed);
  document.getElementById('sortFilter')?.addEventListener('change',renderFeed);
  renderFeed(); renderAuth();
}
function renderFeed(){
  const grid=document.getElementById('videoGrid'); if(!grid) return;
  const s=(document.getElementById('searchInput')?.value||'').toLowerCase(); const sport=document.getElementById('sportFilter')?.value||'all'; const music=document.getElementById('musicFilter')?.value||'all'; const sort=document.getElementById('sortFilter')?.value||'newest';
  let f=posts.filter(p=>{const u=usersCache[p.user_id]; return (!s||p.title?.toLowerCase().includes(s)||u?.username?.toLowerCase().includes(s)) && (sport==='all'||p.sport===sport) && (music==='all'||p.music===music);});
  if(sort==='likes') f.sort((a,b)=>(likesMap[b.id]?.length||0)-(likesMap[a.id]?.length||0)); else if(sort==='comments') f.sort((a,b)=>(commentsMap[b.id]?.length||0)-(commentsMap[a.id]?.length||0)); else f.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  if(f.length===0){ grid.innerHTML=`<div class="col-span-full text-center py-20 text-gray-500">No posts yet.</div>`; return; }
  grid.innerHTML=f.map(p=>{const u=usersCache[p.user_id]||{username:'user',avatar_url:''}; const lc=likesMap[p.id]?.length||0; const cc=commentsMap[p.id]?.length||0; const liked=currentUser&&likesMap[p.id]?.some(l=>l.user_id===currentUser.id); return `<article class="glass rounded-2xl overflow-hidden hover:scale-[1.02] transition"><div class="aspect-video bg-dark-800 relative cursor-pointer" onclick="showVideo('${p.id}')"><img src="${p.thumbnail||thumbFromUrl(p.video_url)}" class="w-full h-full object-cover"><div class="absolute bottom-2 left-2 flex gap-2"><span class="px-2 py-1 bg-neon-cyan/20 border border-neon-cyan/40 rounded text-xs">${p.sport}</span><span class="px-2 py-1 bg-neon-purple/20 border border-neon-purple/40 rounded text-xs">${p.music}</span></div></div><div class="p-4"><h3 class="font-bold line-clamp-2">${p.title}</h3><div class="flex justify-between items-center mt-3"><button onclick="showProfile('${p.user_id}')" class="flex items-center gap-2"><img src="${u.avatar_url}" class="w-6 h-6 rounded-full"><span class="text-sm text-gray-300">@${u.username}</span></button><div class="flex gap-3 text-sm text-gray-400"><button onclick="event.stopPropagation();toggleLike('${p.id}')" class="${liked?'text-neon-green':''}">♥ ${lc}</button><button onclick="event.stopPropagation();showVideo('${p.id}')">💬 ${cc}</button><button onclick="event.stopPropagation();shareVideo('${p.id}')" class="hover:text-white">↗</button></div></div></div></article>`; }).join('');
}

// ===== UPLOAD =====
function openUploadModal(){ if(!currentUser) return showLogin(); showModal(`<h3 class="font-bold text-2xl mb-6">Post Your Mix</h3><form onsubmit="handleUpload(event)" class="space-y-4"><input id="up_title" type="text" placeholder="Title" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3"><input id="up_url" type="url" placeholder="YouTube or Vimeo URL" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3"><select id="up_sport" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3"><option value="">Sport</option><option>NBA</option><option>NFL</option><option>Soccer</option><option>UFC</option><option>Other</option></select><select id="up_music" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3"><option value="">Music</option><option>Hip-Hop</option><option>Rock</option><option>EDM</option><option>Pop</option></select><textarea id="up_desc" rows="2" placeholder="Description" class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3"></textarea><button class="w-full py-3 bg-gradient-to-r from-neon-cyan to-neon-green text-dark-900 font-bold rounded-lg">Post</button></form>`); }
async function handleUpload(e){ e.preventDefault(); const title=document.getElementById('up_title').value.trim(); const video_url=document.getElementById('up_url').value.trim(); const sport=document.getElementById('up_sport').value; const music=document.getElementById('up_music').value; const description=document.getElementById('up_desc').value.trim(); const video_id=getVideoId(video_url); if(!video_id) return alert('Invalid URL'); const {data:dup}=await supabaseClient.from('videos').select('id').eq('video_id',video_id); if(dup&&dup.length>0) return alert('Already posted!'); const {error}=await supabaseClient.from('videos').insert({user_id:currentUser.id,title,video_url,video_id,video_type:getYouTubeId(video_url)?'youtube':'vimeo',sport,music,description,thumbnail:thumbFromUrl(video_url)}); if(error) return alert(error.message); closeModal(); await loadAllData(); showMain(); }

// ===== LIKE / VIDEO / SHARE =====
async function toggleLike(id){ if(!currentUser) return showLogin(); if(id.startsWith('demo-')) return; const ex=likesMap[id]?.find(l=>l.user_id===currentUser.id); if(ex){ await supabaseClient.from('likes').delete().eq('id',ex.id); } else { await supabaseClient.from('likes').insert({user_id:currentUser.id,video_id:id}); const v=posts.find(p=>p.id===id); if(v) await createNotification(v.user_id,'like',v.id); } await loadAllData(); renderFeed(); }
function shareVideo(id){
  const url=`${window.location.origin}${window.location.pathname}?v=${id}`;
  const shareData={title:'Check this mix on MusicNSports!',text:'Where Beats Meet Highlights - post your own!',url};
  if(navigator.share) navigator.share(shareData); else { navigator.clipboard.writeText(url); alert(`Link copied!\n\nShare this link: ${url}\n\nWhen they open it they'll see your video + a Join button to sign up.`); }
}
function shareProfile(id){
  const url=`${window.location.origin}${window.location.pathname}?u=${id}`;
  if(navigator.share) navigator.share({title:'My MusicNSports profile',url}); else { navigator.clipboard.writeText(url); alert('Profile link copied!'); }
}
async function showVideo(id){
  const p=posts.find(x=>x.id===id); if(!p) return; const u=usersCache[p.user_id]||{}; const isYt=getYouTubeId(p.video_url); const embed=isYt?`https://www.youtube.com/embed/${p.video_id}?autoplay=1`:`https://player.vimeo.com/video/${p.video_id}?autoplay=1`;
  let comments=[]; try{ const {data}=await supabaseClient.from('comments').select('*,profiles(username,avatar_url)').eq('video_id',id).order('created_at',{ascending:true}); comments=data||[]; }catch(e){}
  const lc=likesMap[id]?.length||0; const liked=currentUser&&likesMap[id]?.some(l=>l.user_id===currentUser.id);
  // build threaded comments
  const topLevel=comments.filter(c=>!c.parent_id); const replies=comments.filter(c=>c.parent_id);
  const renderComment=(c,depth=0)=>{
    const cu=c.profiles||usersCache[c.user_id]||{}; const cl=commentLikesMap[c.id]||[]; const cliked=currentUser&&cl.some(l=>l.user_id===currentUser.id);
    const childs=replies.filter(r=>r.parent_id===c.id);
    return `<div class="flex gap-2 ${depth>0?'ml-8 mt-2':''}"><img src="${cu.avatar_url||''}" class="w-8 h-8 rounded-full flex-shrink-0"><div class="bg-dark-700 rounded-lg px-3 py-2 flex-1"><div class="flex justify-between"><b class="text-sm cursor-pointer hover:text-neon-cyan" onclick="closeModal();showProfile('${c.user_id}')">@${cu.username||'user'}</b><span class="text-xs text-gray-500">${timeAgo(c.created_at)}</span></div><p class="text-sm my-1">${c.text||c.content||''}</p><div class="flex gap-3 mt-1 text-xs"><button onclick="toggleCommentLike('${c.id}','${id}')" class="${cliked?'text-neon-green':'text-gray-400'} hover:text-neon-green">♥ ${cl.length}</button><button onclick="replyToComment('${c.id}','@${cu.username||'user'} ')" class="text-gray-400 hover:text-neon-cyan">Reply</button>${currentUser?.id===c.user_id?`<button onclick="deleteComment('${c.id}','${id}')" class="text-red-400">Delete</button>`:''}</div>${childs.map(rc=>renderComment(rc,depth+1)).join('')}</div></div>`;
  };
  const joinPrompt=!currentUser?`<div class="glass border border-neon-cyan/30 rounded-xl p-4 flex flex-col sm:flex-row items-center justify-between gap-3"><p class="text-sm text-gray-200">🔥 Like this mix? <span class="font-bold text-neon-cyan">Post your own and join the community!</span></p><button onclick="closeModal();showSignup()" class="px-5 py-2 bg-neon-cyan text-dark-900 font-bold rounded-lg whitespace-nowrap">Sign Up Free</button></div>`:'';
  showModal(`<div class="space-y-4"><div class="aspect-video bg-black rounded-xl overflow-hidden"><iframe src="${embed}" class="w-full h-full" frameborder="0" allowfullscreen></iframe></div>${joinPrompt}<div class="flex justify-between items-center"><h3 class="font-bold text-xl">${p.title}</h3><div class="flex gap-2"><button onclick="toggleLike('${p.id}')" class="px-3 py-1 rounded ${liked?'bg-neon-green text-dark-900':'bg-dark-700'}">${liked?'♥ Liked':'♡ Like'} ${lc}</button><button onclick="shareVideo('${p.id}')" class="px-3 py-1 rounded bg-dark-700 hover:bg-dark-600 text-sm">↗ Share</button></div></div><p class="text-gray-400 text-sm">${p.description||''}</p><div class="flex gap-2"><span class="px-2 py-1 bg-neon-cyan/20 border border-neon-cyan/40 rounded text-xs">${p.sport}</span><span class="px-2 py-1 bg-neon-purple/20 border border-neon-purple/40 rounded text-xs">${p.music}</span></div><div class="border-t border-white/10 pt-4"><h4 class="font-semibold mb-3">Comments (${comments.length})</h4><div class="space-y-3 mb-4 max-h-[40vh] overflow-y-auto">${topLevel.map(c=>renderComment(c)).join('')||'<p class="text-gray-500 text-sm">No comments yet.</p>'}</div>${currentUser?`<form onsubmit="addComment(event,'${id}')" class="flex gap-2"><input id="cInput" required placeholder="${replyingTo?'Replying...':'Add a comment...'}" class="flex-1 bg-dark-700 border border-white/10 rounded-lg px-4 py-2 focus:border-neon-cyan focus:outline-none"><button class="px-4 py-2 bg-neon-cyan text-dark-900 font-bold rounded">Post</button><button type="button" onclick="cancelReply()" class="px-2 text-xs text-gray-400">Cancel</button></form>`:'<p class="text-sm text-gray-500">Login to comment • <button onclick="closeModal();showSignup()" class="text-neon-cyan underline">Sign up free</button></p>'}</div></div>`,true);
}
function replyToComment(parentId, text){ replyingTo=parentId; const input=document.getElementById('cInput'); if(input){ input.value=text; input.focus(); } }
function cancelReply(){ replyingTo=null; const input=document.getElementById('cInput'); if(input){ input.value=''; input.placeholder='Add a comment...'; } }
async function toggleCommentLike(commentId, videoId){ if(!currentUser) return showLogin(); try{ const {data:ex}=await supabaseClient.from('comment_likes').select('id').eq('user_id',currentUser.id).eq('comment_id',commentId).maybeSingle(); if(ex){ await supabaseClient.from('comment_likes').delete().eq('id',ex.id); } else { await supabaseClient.from('comment_likes').insert({user_id:currentUser.id,comment_id:commentId}); const c=(commentsMap[videoId]||[]).find(x=>x.id===commentId); if(c) await createNotification(c.user_id,'comment_like',videoId,'liked your comment',commentId); } await loadAllData(); showVideo(videoId); }catch(e){ console.error(e); } }
async function addComment(e,id){ e.preventDefault(); const text=document.getElementById('cInput').value.trim(); if(!text) return; const parent_id=replyingTo||null; const {error}=await supabaseClient.from('comments').insert({user_id:currentUser.id,video_id:id,text,parent_id}); if(error) return alert(error.message); const video=posts.find(p=>p.id===id); if(video) await createNotification(video.user_id,'comment',id,text); // notify video owner
  // if replying, also notify parent comment owner
  if(parent_id){ const parent=Object.values(commentsMap).flat().find(c=>c.id===parent_id); if(parent&&parent.user_id!==currentUser.id) await createNotification(parent.user_id,'reply',id,text,parent_id); }
  replyingTo=null; showVideo(id); await loadAllData();
}
async function deleteComment(cid,vid){ if(!confirm('Delete comment?')) return; await supabaseClient.from('comments').delete().eq('id',cid); showVideo(vid); await loadAllData(); }

// ===== PROFILE / FOLLOW WITH PROCESSING =====
async function showProfile(uid){
  let prof=usersCache[uid]; if(!prof){ const {data}=await supabaseClient.from('profiles').select('*').eq('id',uid).single(); prof=data; }
  if(!prof) return;
  const {data:userPosts}=await supabaseClient.from('videos').select('*').eq('user_id',uid).order('created_at',{ascending:false});
  const {data:followers}=await supabaseClient.from('followers').select('*').eq('following_id',uid);
  const {data:following}=await supabaseClient.from('followers').select('*').eq('follower_id',uid);
  let isFollowing=false; if(currentUser){ const {data}=await supabaseClient.from('followers').select('*').eq('follower_id',currentUser.id).eq('following_id',uid).maybeSingle(); isFollowing=!!data; }
  const isOwn=currentUser?.id===uid;
  const followClass=isFollowing?'bg-dark-600 text-white border border-white/20':'bg-neon-cyan text-dark-900 font-bold';
  const followText=isFollowing?'Following ✓':'Follow';
  document.getElementById('mainContent').innerHTML=`<div class="max-w-4xl mx-auto"><button onclick="showMain()" class="mb-6 text-gray-400 hover:text-white">← Back to Feed</button><div class="glass rounded-2xl p-8 mb-8"><div class="flex flex-col md:flex-row gap-6"><img src="${prof.avatar_url}" class="w-24 h-24 rounded-full border-4 border-neon-cyan/30"><div class="flex-1"><div class="flex flex-wrap items-center gap-3 mb-2"><h2 class="text-3xl font-bold">@${prof.username}</h2>${currentUser&&!isOwn?`<button id="followBtn" onclick="toggleFollow('${uid}')" class="px-5 py-2 ${followClass} rounded-lg text-sm transition">${followText}</button>`:''}${isOwn?`<button onclick="showEditProfile()" class="px-4 py-2 bg-dark-600 rounded-lg text-sm">Edit</button>`:''}<button onclick="shareProfile('${prof.id}')" class="px-4 py-2 bg-dark-600 rounded-lg text-sm hover:bg-dark-500">↗ Share Profile</button></div><p class="text-gray-400 mb-3">${prof.bio||'No bio yet.'}</p><div class="flex gap-6 text-sm"><span><b>${userPosts?.length||0}</b> Posts</span><span><b>${followers?.length||0}</b> Followers</span><span><b>${following?.length||0}</b> Following</span></div></div></div></div><div class="grid grid-cols-1 md:grid-cols-3 gap-6">${(userPosts||[]).map(p=>`<article class="glass rounded-2xl overflow-hidden cursor-pointer hover:scale-[1.02] transition" onclick="showVideo('${p.id}')"><div class="aspect-video bg-dark-800"><img src="${p.thumbnail||thumbFromUrl(p.video_url)}" class="w-full h-full object-cover"></div><div class="p-4"><h3 class="font-bold line-clamp-2">${p.title}</h3><p class="text-xs text-gray-500 mt-1">${timeAgo(p.created_at)}</p>${isOwn?`<button onclick="event.stopPropagation();deletePost('${p.id}')" class="text-xs text-red-400 mt-2">Delete</button>`:''}</div></article>`).join('')||'<p class="col-span-full text-center text-gray-500 py-20">No posts</p>'}</div></div>`;
}
async function toggleFollow(fid){
  if(!currentUser) return showLogin();
  const btn=document.getElementById('followBtn'); if(btn){ btn.textContent='Processing...'; btn.disabled=true; btn.classList.add('opacity-50'); }
  try{
    const {data}=await supabaseClient.from('followers').select('*').eq('follower_id',currentUser.id).eq('following_id',fid).maybeSingle();
    if(data){
      await supabaseClient.from('followers').delete().eq('id',data.id);
      // unfollow does not create notification
    } else {
      await supabaseClient.from('followers').insert({follower_id:currentUser.id,following_id:fid});
      await createNotification(fid,'follow');
    }
    await loadAllData(); showProfile(fid);
  }catch(e){ alert(e.message); if(btn){ btn.textContent='Follow'; btn.disabled=false; btn.classList.remove('opacity-50'); } }
}
async function deletePost(id){ if(!confirm('Delete this video?')) return; await supabaseClient.from('videos').delete().eq('id',id); await loadAllData(); showProfile(currentUser.id); }
function showEditProfile(){ if(!currentProfile) return; showModal(`<h3 class="font-bold text-xl mb-4">Edit Profile</h3><form onsubmit="handleEdit(event)" class="space-y-3"><label class="text-sm text-gray-400">Bio</label><textarea id="ebio" rows="3" class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3">${currentProfile.bio||''}</textarea><label class="text-sm text-gray-400">Avatar URL</label><input id="eav" type="url" value="${currentProfile.avatar_url}" class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3"><button class="w-full py-3 bg-neon-cyan text-dark-900 font-bold rounded">Save Changes</button></form><div class="border-t border-white/10 mt-6 pt-4"><h4 class="text-red-400 font-bold mb-2">Danger Zone</h4><p class="text-xs text-gray-500 mb-3">Delete your profile and all your videos, likes, comments. This cannot be undone.</p><button onclick="deleteProfile()" class="w-full py-3 bg-red-500/20 text-red-400 font-bold rounded hover:bg-red-500/30">Delete My Profile</button></div>`); }
async function handleEdit(e){ e.preventDefault(); const bio=document.getElementById('ebio').value.trim(); const avatar_url=document.getElementById('eav').value.trim(); const {error}=await supabaseClient.from('profiles').update({bio,avatar_url}).eq('id',currentUser.id); if(error) return alert(error.message); closeModal(); await loadProfile(currentUser); showProfile(currentUser.id); }
async function deleteProfile(){
  if(!confirm('DELETE YOUR PROFILE? This will delete all videos, likes, comments, followers. Cannot be undone!')) return;
  if(!confirm('Final confirmation: Are you SURE you want to delete @'+currentProfile.username+'?')) return;
  try{
    const uid=currentUser.id;
    // Delete related data (order matters due to FK)
    await supabaseClient.from('comment_likes').delete().eq('user_id',uid);
    await supabaseClient.from('notifications').delete().or(`recipient_id.eq.${uid},actor_id.eq.${uid}`);
    await supabaseClient.from('comments').delete().eq('user_id',uid);
    await supabaseClient.from('likes').delete().eq('user_id',uid);
    await supabaseClient.from('followers').delete().or(`follower_id.eq.${uid},following_id.eq.${uid}`);
    await supabaseClient.from('videos').delete().eq('user_id',uid);
    await supabaseClient.from('profiles').delete().eq('id',uid);
    await supabaseClient.auth.signOut();
    alert('Profile deleted. All your data removed.');
    window.location.href=window.location.pathname;
  }catch(e){ alert('Delete failed: '+e.message); }
}

// ===== NOTIFICATIONS CLICKABLE =====
async function showNotifications(){
  if(!currentUser) return showLogin();
  const unreadIds=notifications.filter(n=>!n.is_read).map(n=>n.id);
  if(unreadIds.length>0){ await supabaseClient.from('notifications').update({is_read:true}).in('id',unreadIds); notifications.forEach(n=>n.is_read=true); updateNotifBadge(); }
  let html=`<h3 class="font-bold text-xl mb-4">Notifications</h3><div class="space-y-2 max-h-[60vh] overflow-y-auto">`;
  if(notifications.length===0){ html+=`<p class="text-gray-500 text-center py-8">No notifications yet.<br><span class="text-xs">When someone likes, comments, or follows you, you'll see it here.</span></p>`; }
  else{
    html+=notifications.map(n=>{
      const actor=usersCache[n.actor_id]||{username:'Someone',avatar_url:''};
      let msg='', icon='', clickable=false, action='';
      if(n.type==='like'){ msg=`liked your video`; icon='♥'; if(n.video_id){ const v=posts.find(p=>p.id===n.video_id); if(v) msg+=`: "${v.title.slice(0,30)}..."`; clickable=true; action=`showVideo('${n.video_id}')`; } }
      else if(n.type==='comment'){ msg=`commented: "${(n.content||'').slice(0,40)}"`; icon='💬'; if(n.video_id){ const v=posts.find(p=>p.id===n.video_id); if(v) msg+=` on "${v.title.slice(0,20)}..."`; clickable=true; action=`showVideo('${n.video_id}')`; } }
      else if(n.type==='reply'){ msg=`replied to your comment: "${(n.content||'').slice(0,30)}"`; icon='↩️'; clickable=true; action=`showVideo('${n.video_id}')`; }
      else if(n.type==='comment_like'){ msg=`liked your comment`; icon='♥'; clickable=!!n.video_id; if(clickable) action=`showVideo('${n.video_id}')`; }
      else if(n.type==='follow'){ msg=`started following you`; icon='👤'; clickable=true; action=`showProfile('${n.actor_id}')`; }
      const cls=clickable?'cursor-pointer hover:bg-dark-600 transition border border-transparent hover:border-neon-cyan/30':'';
      const onclk=clickable?`onclick="closeModal();${action}"`:'';
      return `<div class="p-3 bg-dark-700 rounded-xl flex items-center gap-3 ${!n.is_read?'border-l-4 border-neon-cyan':''} ${cls}" ${onclk}><img src="${actor.avatar_url||''}" class="w-9 h-9 rounded-full flex-shrink-0"><div class="flex-1 min-w-0"><span class="font-bold text-white">@${actor.username}</span> <span class="text-gray-300 text-sm">${msg}</span><div class="text-xs text-gray-500">${timeAgo(n.created_at)}</div></div><div class="text-lg">${icon}</div></div>`;
    }).join('');
  }
  html+=`</div><p class="text-xs text-gray-500 mt-4 text-center">Click a notification to jump to the video or profile</p>`;
  showModal(html);
}

document.addEventListener('DOMContentLoaded',init);
</script>
