<script>

const SUPABASE_URL = 'https://dsgilznlijicfwxgxilv.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRzZ2lsem5saWppY2Z3eGd4aWx2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5MDEzNjIsImV4cCI6MjA5OTQ3NzM2Mn0.y0pvBThvU6YX3x-nqJj3Aow_YLPWb-b-3Yw9EezUtGA';

let supabaseClient = null;

if (SUPABASE_URL && SUPABASE_ANON_KEY && SUPABASE_ANON_KEY.startsWith('eyJ')) {
  try {
    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ===== UTILS =====
const $ = s => document.querySelector(s);

const getYouTubeId = url => { const m = url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/); return m ? m[1] : null; };
const getVimeoId = url => { const m = url.match(/vimeo\.com\/(\d+)/); return m ? m[1] : null; };
const getVideoId = url => getYouTubeId(url) || getVimeoId(url);
const thumbFromUrl = url => { const y=getYouTubeId(url); if(y) return `https://img.youtube.com/vi/${y}/mqdefault.jpg`; const v=getVimeoId(url); if(v) return `https://vumbnail.com/${v}.jpg`; return 'https://via.placeholder.com/320x180?text=Video'; };
const timeAgo = ts => { const d=new Date(ts); const s=Math.floor((Date.now()-d.getTime())/1000); if(s<60) return `${s}s ago`; const m=Math.floor(s/60); if(m<60) return `${m}m ago`; const h=Math.floor(m/60); if(h<24) return `${h}h ago`; const day=Math.floor(h/24); return `${day}d ago`; };

// ===== INIT =====
async function init(){
  // Check for password recovery hash FIRST
  const hashParams = new URLSearchParams(window.location.hash.substring(1));
  if (hashParams.get('type') === 'recovery') {
    showResetPasswordPage();
    return; 
  }

  showMain();
  renderAuth();
  
  if(hasSupabase){
    try{
      const { data:{session} } = await supabaseClient.auth.getSession();
      if(session?.user) {
        await loadProfile(session.user);
        await loadNotifications();
      }
      await loadAllData();
      
      // Handle Share Links
      const params = new URLSearchParams(window.location.search);
      const shareVideoId = params.get('v');
      const shareUserId = params.get('u');
      
      if (shareVideoId) showVideo(shareVideoId);
      else if (shareUserId) showProfile(shareUserId);

      supabaseClient.auth.onAuthStateChange(async (ev, sess)=>{
        if(sess?.user) {
          await loadProfile(sess.user);
          await loadNotifications();
        } else { 
          currentUser=null; currentProfile=null; notifications=[]; 
          updateNotifBadge();
        }
        renderAuth(); await loadAllData(); renderFeed();
      });
    }catch(e){ console.error('Supabase load error', e); }
  }
  renderAuth();
  renderFeed();
}

async function loadProfile(user){
  currentUser = user;
  try{
    let { data } = await supabaseClient.from('profiles').select('*').eq('id', user.id).single();
    if(!data){
      const username = user.user_metadata?.username || user.email.split('@')[0].replace(/[^a-z0-9_]/gi,'');
      const { data: newP } = await supabaseClient.from('profiles').insert({ id:user.id, username, avatar_url:`https://api.dicebear.com/7.x/thumbs/svg?seed=${username}`, bio:'' }).select().single();
      data = newP;
    }
    currentProfile = data;
    if(data) usersCache[data.id]=data;
  }catch(e){ console.error(e); }
}

async function loadAllData(){
  if(!hasSupabase) return;
  try{
    const [{data:profiles},{data:videos},{data:likes},{data:comments},{data:follows}] = await Promise.all([
      supabaseClient.from('profiles').select('*'),
      supabaseClient.from('videos').select('*').order('created_at',{ascending:false}),
      supabaseClient.from('likes').select('*'),
      supabaseClient.from('comments').select('*'),
      supabaseClient.from('followers').select('*')
    ]);
    (profiles||[]).forEach(p=>usersCache[p.id]=p);
    posts = videos||[];
    likesMap={}; commentsMap={}; followsCache={};
    (likes||[]).forEach(l=>{ if(!likesMap[l.video_id]) likesMap[l.video_id]=[]; likesMap[l.video_id].push(l); });
    (comments||[]).forEach(c=>{ if(!commentsMap[c.video_id]) commentsMap[c.video_id]=[]; commentsMap[c.video_id].push(c); });
    (follows||[]).forEach(f=>{ if(!followsCache[f.follower_id]) followsCache[f.follower_id]={}; followsCache[f.follower_id][f.following_id]=true; });
  }catch(e){ console.error('loadAllData failed', e); }
}

// ===== NOTIFICATIONS LOGIC =====
async function loadNotifications() {
  if(!hasSupabase || !currentUser) return;
  try {
    const { data } = await supabaseClient.from('notifications').select('*').eq('recipient_id', currentUser.id).order('created_at', { ascending: false }).limit(20);
    if(data) { notifications = data; updateNotifBadge(); }
  } catch(e) { console.error('Notif load error', e); }
}

function updateNotifBadge() {
  const badge = $('#notifBadge'); if(!badge) return;
  const unreadCount = notifications.filter(n => !n.is_read).length;
  if(unreadCount > 0) { badge.textContent = unreadCount > 9 ? '9+' : unreadCount; badge.classList.remove('hidden'); } 
  else { badge.classList.add('hidden'); }
}

async function createNotification(recipientId, type, videoId = null, content = '') {
  if(!hasSupabase || !currentUser || recipientId === currentUser.id) return; 
  let parsedVideoId = videoId ? Number(videoId) : null;
  await supabaseClient.from('notifications').insert({ recipient_id: recipientId, actor_id: currentUser.id, type, video_id: parsedVideoId, content });
  if(recipientId === currentUser.id) await loadNotifications();
}

// ===== AUTH UI =====
function renderAuth(){
  const el=$('#authSection'); if(!el) return;
  if(currentUser && currentProfile){
    el.innerHTML=`<div class="flex items-center gap-3"><button onclick="showProfile('${currentUser.id}')" class="flex items-center gap-2 hover:bg-white/5 rounded-lg px-3 py-2"><img src="${currentProfile.avatar_url}" class="w-8 h-8 rounded-full"><span class="font-semibold hidden sm:block">@${currentProfile.username}</span></button><button onclick="logout()" class="text-gray-400 hover:text-white text-sm">Logout</button></div>`;
    const b=document.getElementById('uploadBtn'); if(b) b.classList.remove('hidden');
  }else{
    el.innerHTML=`<button onclick="showLogin()" class="px-4 py-2 text-gray-300 hover:text-white">Login</button><button onclick="showSignup()" class="px-4 py-2 bg-neon-cyan text-dark-900 font-semibold rounded-lg btn-glow">Sign Up</button>`;
    const b=document.getElementById('uploadBtn'); if(b) b.classList.add('hidden');
  }
}
async function logout(){ if(hasSupabase) await supabaseClient.auth.signOut(); currentUser=null; currentProfile=null; showMain(); renderAuth(); }

// ===== MODALS =====
function showModal(html, wide=false){ const c=$('#modalContainer'); c.innerHTML=`<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm" onclick="if(event.target===this) closeModal()"><div class="glass rounded-2xl p-6 w-full ${wide?'max-w-3xl':'max-w-md'} relative max-h-[90vh] overflow-y-auto"><button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>${html}</div></div>`; }
function closeModal(){ $('#modalContainer').innerHTML=''; }

function showSignup(){ showModal(`<h3 class="font-display font-bold text-2xl mb-6">Create Account</h3><form onsubmit="handleSignup(event)" class="space-y-4"><input id="su_email" type="email" placeholder="Email Address" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3 focus:border-neon-cyan focus:outline-none"><input id="su_username" type="text" placeholder="Username" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3"><input id="su_password" type="password" placeholder="Password (Min 6 chars)" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3"><button class="w-full py-3 bg-gradient-to-r from-neon-cyan to-neon-green text-dark-900 font-bold rounded-lg">Sign Up</button><p class="text-center text-gray-400 text-sm">Have account? <button type="button" onclick="closeModal();showLogin()" class="text-neon-cyan">Login</button></p></form>`); }

async function handleSignup(e){ 
  e.preventDefault(); if(!hasSupabase) return;
  const email=document.getElementById('su_email').value.trim(); 
  const username=document.getElementById('su_username').value.trim().replace(/\s+/g,'_'); 
  const password=document.getElementById('su_password').value; 
  const { data: ex } = await supabaseClient.from('profiles').select('id').eq('username',username).maybeSingle(); 
  if(ex) return alert('Username taken'); 
  const { data, error } = await supabaseClient.auth.signUp({ email, password, options: { data: { username } } }); 
  if(error) return alert(error.message); 
  if(data.user){ 
    await supabaseClient.from('profiles').insert({ id:data.user.id, username, avatar_url:`https://api.dicebear.com/7.x/thumbs/svg?seed=${username}`, bio:'' }); 
    closeModal(); alert('Account created! You are now logged in.'); 
  } 
}

function showLogin(){ showModal(`<h3 class="font-display font-bold text-2xl mb-6">Welcome Back</h3><form onsubmit="handleLogin(event)" class="space-y-4"><input id="li_email" type="email" placeholder="Email Address" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3"><input id="li_password" type="password" placeholder="Password" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3"><button class="w-full py-3 bg-gradient-to-r from-neon-cyan to-neon-green text-dark-900 font-bold rounded-lg">Login</button></form><p class="text-center text-gray-400 text-sm mt-4"><button type="button" onclick="showForgotPassword()" class="text-neon-cyan hover:underline">Forgot password?</button></p>`); }

async function handleLogin(e){ 
  e.preventDefault(); if(!hasSupabase) return;
  const email=document.getElementById('li_email').value.trim(); 
  const password=document.getElementById('li_password').value; 
  const { error } = await supabaseClient.auth.signInWithPassword({ email, password }); 
  if(error) return alert(error.message); 
  closeModal(); 
}

function showForgotPassword() {
  showModal(`<h3 class="font-display font-bold text-2xl mb-6">Reset Password</h3><form onsubmit="handleForgotPassword(event)" class="space-y-4"><input id="fp_email" type="email" placeholder="Enter your email address" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3"><button class="w-full py-3 bg-gradient-to-r from-neon-cyan to-neon-green text-dark-900 font-bold rounded-lg">Send Reset Link</button><p class="text-center text-gray-400 text-sm">Remembered it? <button type="button" onclick="closeModal();showLogin()" class="text-neon-cyan hover:underline">Back to Login</button></p></form>`);
}

async function handleForgotPassword(e) {
  e.preventDefault(); if(!hasSupabase) return;
  const email = document.getElementById('fp_email').value.trim();
  const { error } = await supabaseClient.auth.resetPasswordForEmail(email, { redirectTo: window.location.href });
  if(error) return alert(error.message);
  alert('Password reset link sent! Check your email inbox.');
  closeModal();
}

// Full page reset password view

    <div class="max-w-md mx-auto mt-20">

async function handleUpdatePassword(e) {

  if (error) return alert(error.message);
  alert('Password updated successfully!');
  window.location.href = window.location.pathname; 
}

      <button onclick="showSignup()" class="px-6 py-2 bg-neon-cyan text-dark-900 font-bold rounded-lg whitespace-nowrap hover:scale-105 transition">Sign Up Free</button>
    </div>`;
  }

  document.getElementById('mainContent').innerHTML = joinBanner + `
    <section class="text-center mb-12"><h2 class="font-display font-black text-4xl md:text-6xl mb-4 bg-gradient-to-r from-neon-cyan via-neon-green to-neon-purple bg-clip-text text-transparent">Where Beats Meet Highlights</h2><p class="text-gray-400 text-lg max-w-2xl mx-auto mb-8">Post your fire sports edits. Match NBA dunks with Hip-Hop. UFC KOs with EDM. Soccer bangers with Rock.</p><button id="uploadBtn" onclick="openUploadModal()" class="px-8 py-4 bg-gradient-to-r from-neon-cyan to-neon-green text-dark-900 font-bold rounded-xl btn-glow hover:scale-105 transition ${!currentUser?'hidden':''}">Post Your Mix</button></section>
    <section class="glass rounded-2xl p-4 mb-8 sticky top-20 z-40"><div class="grid grid-cols-1 md:grid-cols-5 gap-3"><input id="searchInput" type="text" placeholder="Search title, user, or description..." class="md:col-span-2 bg-dark-700 border border-white/10 rounded-lg px-4 py-2 focus:outline-none focus:border-neon-cyan"><select id="sportFilter" class="bg-dark-700 border border-white/10 rounded-lg px-4 py-2"><option value="all">All Sports</option><option>NBA</option><option>NFL</option><option>Soccer</option><option>UFC</option><option>Other</option></select><select id="musicFilter" class="bg-dark-700 border border-white/10 rounded-lg px-4 py-2"><option value="all">All Music</option><option>Hip-Hop</option><option>Rock</option><option>EDM</option><option>Pop</option><option>Other</option></select><select id="sortFilter" class="bg-dark-700 border border-white/10 rounded-lg px-4 py-2"><option value="newest">Newest</option><option value="likes">Most Liked</option><option value="comments">Most Commented</option></select></div></section>

    <section class="glass rounded-2xl p-8 mb-8"><h3 class="font-display font-bold text-2xl mb-4 text-neon-cyan">Community Guidelines</h3><div class="space-y-2 text-sm text-gray-300"><p><strong class="text-white">1. Keep it Sports + Music:</strong> All posts must pair sports with music.</p><p><strong class="text-white">2. No Hate:</strong> Respect athletes, artists, users.</p><p><strong class="text-white">3. Own Your Content:</strong> Only post what you have rights to share.</p><p><strong class="text-white">4. NSFW = Ban:</strong> No nudity or graphic violence.</p><p><strong class="text-white">5. No Spam:</strong> One video, one post.</p></div></section>
    <section class="glass rounded-2xl p-8 mb-16"><h3 class="font-display font-bold text-2xl mb-6 text-neon-green">FAQ</h3><div class="space-y-4"><div><h4 class="font-semibold text-white">Is the website free to use?</h4><p class="text-gray-400">YES. Absolutely FREE.</p></div><div><h4 class="font-semibold text-white">What types of videos can I post?</h4><p class="text-gray-400">Any sports related content with music.</p></div><div><h4 class="font-semibold text-white">Do I need to upload files?</h4><p class="text-gray-400">No, just paste YouTube or Vimeo link.</p></div><div><h4 class="font-semibold text-white">Can I post the same video twice?</h4><p class="text-gray-400">No, duplicates are blocked.</p></div></div></section>`;
  
  document.getElementById('searchInput')?.addEventListener('input', renderFeed);
  document.getElementById('sportFilter')?.addEventListener('change', renderFeed);
  document.getElementById('musicFilter')?.addEventListener('change', renderFeed);
  document.getElementById('sortFilter')?.addEventListener('change', renderFeed);

}

function renderFeed(){
  const grid=document.getElementById('videoGrid'); if(!grid) return;
  const s=(document.getElementById('searchInput')?.value||'').toLowerCase(); const sport=document.getElementById('sportFilter')?.value||'all'; const music=document.getElementById('musicFilter')?.value||'all'; const sort=document.getElementById('sortFilter')?.value||'newest';
  let f=posts.filter(p=>{ const u=usersCache[p.user_id]; const ms=!s||p.title?.toLowerCase().includes(s)||p.description?.toLowerCase().includes(s)||u?.username?.toLowerCase().includes(s); return ms && (sport==='all'||p.sport===sport) && (music==='all'||p.music===music); });
  if(sort==='likes') f.sort((a,b)=>(likesMap[b.id]?.length||0)-(likesMap[a.id]?.length||0)); else if(sort==='comments') f.sort((a,b)=>(commentsMap[b.id]?.length||0)-(commentsMap[a.id]?.length||0)); else f.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  if(f.length===0){ grid.innerHTML=`<div class="col-span-full text-center py-20 text-gray-500">No posts yet. ${currentUser?'Be the first to post!':'Login to post!'}</div>`; return; }
  
  grid.innerHTML=f.map(p=>{ const u=usersCache[p.user_id]||{username:'user',avatar_url:''}; const lc=likesMap[p.id]?.length||0; const cc=commentsMap[p.id]?.length||0; const liked=currentUser&&likesMap[p.id]?.some(l=>l.user_id===currentUser.id); return `<article class="glass rounded-2xl overflow-hidden hover:scale-[1.02] transition"><div class="aspect-video bg-dark-800 relative cursor-pointer" onclick="showVideo('${p.id}')"><img src="${p.thumbnail||thumbFromUrl(p.video_url)}" class="w-full h-full object-cover"><div class="absolute inset-0 bg-gradient-to-t from-dark-900/80 to-transparent"></div><div class="absolute bottom-3 left-3 flex gap-2"><span class="px-2 py-1 bg-neon-cyan/20 border border-neon-cyan/40 rounded text-xs font-semibold">${p.sport}</span><span class="px-2 py-1 bg-neon-purple/20 border border-neon-purple/40 rounded text-xs font-semibold">${p.music}</span></div></div><div class="p-4"><h3 class="font-bold text-lg mb-1 line-clamp-2">${p.title}</h3><p class="text-gray-400 text-sm mb-3 line-clamp-2">${p.description||''}</p><div class="flex items-center justify-between"><button onclick="showProfile('${p.user_id}')" class="flex items-center gap-2"><img src="${u.avatar_url}" class="w-7 h-7 rounded-full"><span class="text-sm text-gray-300">@${u.username}</span></button><div class="flex gap-3 text-sm text-gray-400"><button onclick="event.stopPropagation();toggleLike('${p.id}')" class="${liked?'text-neon-green':'hover:text-neon-green'} flex items-center gap-1 transition">♥ ${lc}</button><button onclick="event.stopPropagation();showVideo('${p.id}')" class="hover:text-neon-cyan flex items-center gap-1 transition">💬 ${cc}</button></div></div></div></article>`; }).join('');
}

// ===== UPLOAD / LIKE / COMMENT / PROFILE =====
function openUploadModal(){ if(!currentUser) return showLogin(); showModal(`<h3 class="font-display font-bold text-2xl mb-6">Post Your Mix</h3><form onsubmit="handleUpload(event)" class="space-y-4"><input id="up_title" type="text" placeholder="Title" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3"><input id="up_url" type="url" placeholder="YouTube or Vimeo URL" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3"><select id="up_sport" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3"><option value="">Sport</option><option>NBA</option><option>NFL</option><option>Soccer</option><option>UFC</option><option>Other</option></select><select id="up_music" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3"><option value="">Music</option><option>Hip-Hop</option><option>Rock</option><option>EDM</option><option>Pop</option><option>Other</option></select><textarea id="up_desc" rows="3" placeholder="Description" class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3"></textarea><button class="w-full py-3 bg-gradient-to-r from-neon-cyan to-neon-green text-dark-900 font-bold rounded-lg">Post Mix</button></form>`); }

async function handleUpload(e){ 
  e.preventDefault(); if(!hasSupabase) return;
  const title=document.getElementById('up_title').value.trim(); 
  const video_url=document.getElementById('up_url').value.trim(); 
  const sport=document.getElementById('up_sport').value; 
  const music=document.getElementById('up_music').value; 
  const description=document.getElementById('up_desc').value.trim(); 
  const video_id=getVideoId(video_url); if(!video_id) return alert('Invalid URL'); 
  const isYt = getYouTubeId(video_url); const video_type = isYt ? 'youtube' : 'vimeo';
  const { data:dup } = await supabaseClient.from('videos').select('id').eq('video_id',video_id); 
  if(dup&&dup.length>0) return alert('This video has already been posted!'); 
  const { error } = await supabaseClient.from('videos').insert({ user_id:currentUser.id, title, video_url, video_id, video_type, sport, music, description, thumbnail:thumbFromUrl(video_url) }); 
  if(error) return alert(error.message); 
  closeModal(); await loadAllData(); showMain(); 
}

async function toggleLike(id){ 
  if(!currentUser) return showLogin(); 
  const ex=likesMap[id]?.find(l=>l.user_id===currentUser.id); 
  if(ex){ await supabaseClient.from('likes').delete().eq('id',ex.id); } 
  else { 
    await supabaseClient.from('likes').insert({ user_id:currentUser.id, video_id:id }); 
    const video = posts.find(p => p.id == id);
    if(video) await createNotification(video.user_id, 'like', video.id);
  } 
  await loadAllData(); renderFeed(); 
}

async function showVideo(id){ 
  const p=posts.find(x=>x.id==id); if(!p) return; 
  const u=usersCache[p.user_id]||{}; 
  const isYt=getYouTubeId(p.video_url); 
  const embed=isYt?`https://www.youtube.com/embed/${p.video_id}?autoplay=1`:`https://player.vimeo.com/video/${p.video_id}?autoplay=1`; 
  
  let comments=[]; 
  if(hasSupabase){ 
    const { data } = await supabaseClient.from('comments').select('*, profiles(username,avatar_url)').eq('video_id',p.id).order('created_at',{ascending:true}); 
    comments=data||[]; 
  } 
  
  // Fetch comment likes
  let cLikesMap = {};
  if(hasSupabase && comments.length > 0) {
    const { data: cLikes } = await supabaseClient.from('comment_likes').select('*').in('comment_id', comments.map(c => c.id));
    cLikes?.forEach(l => { if(!cLikesMap[l.comment_id]) cLikesMap[l.comment_id] = []; cLikesMap[l.comment_id].push(l); });
  }

  const lc=likesMap[p.id]?.length||0; 
  const liked=currentUser&&likesMap[p.id]?.some(l=>l.user_id===currentUser.id); 
  
  const commentsHtml = comments.map(c=>{ 
    const cu=c.profiles||usersCache[c.user_id]||{}; 
    const cLikes = cLikesMap[c.id] || [];
    const cLiked = currentUser && cLikes.some(l => l.user_id === currentUser.id);
    return `
      <div class="flex gap-2">
        <img src="${cu.avatar_url||''}" class="w-8 h-8 rounded-full">
        <div class="bg-dark-700 rounded px-3 py-2 flex-1">
          <div class="flex justify-between">
            <b class="text-sm cursor-pointer hover:text-neon-cyan" onclick="closeModal(); showProfile('${c.user_id}')">@${cu.username||'user'}</b>
            <span class="text-xs text-gray-500">${timeAgo(c.created_at)}</span>
          </div>
          <p class="text-sm my-1">${c.text}</p>
          <div class="flex gap-4 mt-2 text-xs">
            <button onclick="toggleCommentLike('${c.id}', '${p.id}')" class="${cLiked ? 'text-neon-green' : 'text-gray-400'} hover:text-neon-green transition">♥ ${cLikes.length}</button>
            <button onclick="replyToComment('@${cu.username||\"user\"} ')" class="text-gray-400 hover:text-neon-cyan transition">Reply</button>
            ${currentUser?.id===c.user_id ? `<button onclick="deleteComment('${c.id}','${p.id}')" class="text-red-400 hover:text-red-300">Delete</button>` : ''}
          </div>
        </div>
      </div>
    `;
  }).join('') || '<p class="text-gray-500 text-sm">No comments yet. Be the first!</p>';

  showModal(`
    <div class="space-y-4">
      <div class="aspect-video bg-black rounded-xl overflow-hidden">
        <iframe src="${embed}" class="w-full h-full" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
      </div>
      <div class="flex justify-between items-center">
        <h3 class="font-bold text-xl">${p.title}</h3>
        <div class="flex gap-2">
          <button onclick="toggleLike('${p.id}')" class="px-3 py-1 rounded ${liked?'bg-neon-green text-dark-900':'bg-dark-700'} transition">${liked?'♥ Liked':'♡ Like'} ${lc}</button>
          <button onclick="shareVideo('${p.id}')" class="px-3 py-1 rounded bg-dark-700 hover:bg-dark-600 transition text-sm">↗ Share</button>
        </div>
      </div>
      <p class="text-gray-400 text-sm">${p.description||''}</p>
      
      <div class="border-t border-white/10 pt-4">
        <h4 class="font-semibold mb-3">Comments (${comments.length})</h4>
        <div class="space-y-3 mb-4 max-h-60 overflow-y-auto scrollbar-hide">${commentsHtml}</div>
        ${currentUser ? `
          <form onsubmit="addComment(event,'${p.id}')" class="flex gap-2">
            <input id="cInput" required placeholder="Add comment..." class="flex-1 bg-dark-700 border border-white/10 rounded-lg px-4 py-2 focus:border-neon-cyan focus:outline-none">
            <button class="px-4 py-2 bg-neon-cyan text-dark-900 font-bold rounded hover:bg-neon-green transition">Post</button>
          </form>
        ` : '<p class="text-sm text-gray-500">Login to comment</p>'}
      </div>
    </div>
  `, true); 
}

function replyToComment(text) {
  const input = document.getElementById('cInput');
  if(input) { input.value = text; input.focus(); }
}

async function toggleCommentLike(commentId, videoId) {
  if(!currentUser) return showLogin();
  const { data: existing } = await supabaseClient.from('comment_likes').select('id').eq('user_id', currentUser.id).eq('comment_id', commentId).maybeSingle();
  if(existing) {
    await supabaseClient.from('comment_likes').delete().eq('id', existing.id);
  } else {
    await supabaseClient.from('comment_likes').insert({ user_id: currentUser.id, comment_id: commentId });
  }
  showVideo(videoId); // Re-render
}

function shareVideo(id) {
  const url = `${window.location.origin}${window.location.pathname}?v=${id}`;
  if (navigator.share) { navigator.share({ title: 'Check out this mix on MusicNSports!', url }); } 
  else { navigator.clipboard.writeText(url); alert('Link copied to clipboard!'); }
}

async function addComment(e,id){ 
  e.preventDefault(); if(!hasSupabase) return; 
  const textVal=document.getElementById('cInput').value.trim(); if(!textVal) return; 
  const { error } = await supabaseClient.from('comments').insert({ user_id:currentUser.id, video_id:id, text: textVal }); 
  if(error) return alert(error.message); 
  const video = posts.find(p => p.id == id);
  if(video) await createNotification(video.user_id, 'comment', video.id, textVal);
  showVideo(id); await loadAllData(); 
}

async function deleteComment(cid,vid){ 
  if(!confirm('Delete?')) return; 
  await supabaseClient.from('comments').delete().eq('id',cid); 
  showVideo(vid); await loadAllData(); 
}

async function showProfile(uid){ 
  let prof=usersCache[uid]; 
  if(!prof && hasSupabase){ const { data } = await supabaseClient.from('profiles').select('*').eq('id',uid).single(); prof=data; } 
  if(!prof) return; 
  let userPosts=[]; let followers=[]; let following=[]; let isFollowing=false; 
  if(hasSupabase){ 
    const { data: v } = await supabaseClient.from('videos').select('*').eq('user_id',uid).order('created_at',{ascending:false}); userPosts=v||[]; 
    const { data: f1 } = await supabaseClient.from('followers').select('*').eq('following_id',uid); followers=f1||[]; 
    const { data: f2 } = await supabaseClient.from('followers').select('*').eq('follower_id',uid); following=f2||[]; 
    if(currentUser){ const { data } = await supabaseClient.from('followers').select('*').eq('follower_id',currentUser.id).eq('following_id',uid).maybeSingle(); isFollowing=!!data; } 
  } 
  const isOwn=currentUser?.id==uid; 
  
  const followBtnClass = isFollowing ? 'bg-gray-600 text-white hover:bg-red-600 hover:text-white' : 'bg-neon-cyan text-dark-900 hover:bg-neon-green';
  const followBtnText = isFollowing ? 'Unfollow' : 'Follow';
  
  document.getElementById('mainContent').innerHTML=`
    <div class="max-w-4xl mx-auto">
      <button onclick="showMain()" class="mb-6 text-gray-400 hover:text-white">← Back</button>
      <div class="glass rounded-2xl p-8 mb-8">
        <div class="flex flex-col md:flex-row gap-6">
          <img src="${prof.avatar_url}" class="w-24 h-24 rounded-full border-4 border-neon-cyan/30">
          <div class="flex-1">
            <div class="flex flex-wrap items-center gap-3 mb-2">
              <h2 class="text-3xl font-bold">@${prof.username}</h2>
              ${currentUser&&!isOwn ? `<button onclick="toggleFollow('${uid}')" class="px-4 py-2 ${followBtnClass} rounded text-sm font-semibold transition">${followBtnText}</button>` : ''}
              ${isOwn ? `<button onclick="showEditProfile()" class="px-4 py-2 bg-dark-600 rounded text-sm hover:bg-dark-500 transition">Edit Profile</button>` : ''}
              <button onclick="shareProfile('${prof.id}')" class="px-4 py-2 bg-dark-600 rounded text-sm hover:bg-dark-500 transition">↗ Share Profile</button>
            </div>
            <p class="text-gray-400 mb-3">${prof.bio||'No bio'}</p>
            <div class="flex gap-6 text-sm">
              <span><b>${userPosts.length}</b> Posts</span>
              <span><b>${followers.length}</b> Followers</span>
              <span><b>${following.length}</b> Following</span>
            </div>
          </div>
        </div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        ${userPosts.map(p=>`
          <article class="glass rounded-2xl overflow-hidden cursor-pointer hover:scale-[1.02] transition" onclick="showVideo('${p.id}')">
            <div class="aspect-video bg-dark-800"><img src="${p.thumbnail||thumbFromUrl(p.video_url)}" class="w-full h-full object-cover"></div>
            <div class="p-4">
              <h3 class="font-bold line-clamp-2">${p.title}</h3>
              <p class="text-xs text-gray-500 mt-1">${timeAgo(p.created_at)}</p>
              ${isOwn?`<button onclick="event.stopPropagation();deletePost('${p.id}')" class="text-xs text-red-400 mt-2 hover:text-red-300">Delete</button>`:''}
            </div>
          </article>
        `).join('') || '<p class="col-span-full text-center text-gray-500 py-20">No posts</p>'}
      </div>
    </div>
  `; 
}

function shareProfile(id) {
  const url = `${window.location.origin}${window.location.pathname}?u=${id}`;
  if (navigator.share) { navigator.share({ title: 'Check out this profile on MusicNSports!', url }); } 
  else { navigator.clipboard.writeText(url); alert('Link copied to clipboard!'); }
}

async function toggleFollow(fid){ 
  if(!currentUser) return showLogin(); if(!hasSupabase) return; 
  const { data } = await supabaseClient.from('followers').select('*').eq('follower_id',currentUser.id).eq('following_id',fid).maybeSingle(); 
  if(data) {
    await supabaseClient.from('followers').delete().eq('id',data.id); 
  } else {
    await supabaseClient.from('followers').insert({ follower_id:currentUser.id, following_id:fid }); 
    await createNotification(fid, 'follow');
  } 
  await loadAllData(); showProfile(fid); 
}

async function deletePost(id){ 
  if(!confirm('Delete?')) return; if(!hasSupabase) return; 
  await supabaseClient.from('videos').delete().eq('id',id); 
  await loadAllData(); showProfile(currentUser.id); 
}

function showEditProfile(){ 
  if(!currentProfile) return; 
  showModal(`
    <h3 class="font-bold text-xl mb-4">Edit Profile</h3>
    <form onsubmit="handleEdit(event)" class="space-y-3">
      <textarea id="ebio" rows="3" class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3 focus:border-neon-cyan focus:outline-none">${currentProfile.bio||''}</textarea>
      <input id="eav" type="url" value="${currentProfile.avatar_url}" class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3 focus:border-neon-cyan focus:outline-none">
      <button class="w-full py-3 bg-neon-cyan text-dark-900 font-bold rounded hover:bg-neon-green transition">Save Changes</button>
    </form>
    <div class="border-t border-white/10 mt-6 pt-4">
      <button onclick="deleteProfile()" class="w-full py-3 bg-red-500/20 text-red-400 font-bold rounded hover:bg-red-500/40 transition">Delete Profile</button>
    </div>
  `); 
}

async function deleteProfile() {
  if(!confirm('Are you sure you want to delete your profile? This cannot be undone.')) return;
  await supabaseClient.from('profiles').delete().eq('id', currentUser.id);
  await supabaseClient.auth.signOut();
  alert('Profile deleted.');
  window.location.reload();
}

async function handleEdit(e){ 
  e.preventDefault(); 
  const bio=document.getElementById('ebio').value.trim(); 
  const avatar_url=document.getElementById('eav').value.trim(); 
  const { error } = await supabaseClient.from('profiles').update({ bio, avatar_url }).eq('id',currentUser.id); 
  if(error) return alert(error.message); 
  closeModal(); await loadProfile(currentUser); showProfile(currentUser.id); 
}

async function showNotifications(){ 
  if(!currentUser) return showLogin();
  const unreadIds = notifications.filter(n => !n.is_read).map(n => n.id);
  if(unreadIds.length > 0) {
    await supabaseClient.from('notifications').update({ is_read: true }).in('id', unreadIds);
    notifications.forEach(n => n.is_read = true);
    updateNotifBadge();
  }

  let html = `<h3 class="font-bold text-xl mb-4">Notifications</h3><div class="space-y-2 text-sm">`;
  if(notifications.length === 0) {
    html += `<p class="text-gray-500 text-center py-4">No notifications yet.</p>`;
  } else {
    notifications.forEach(n => {
      const actor = usersCache[n.actor_id] || { username: 'Someone', avatar_url: '' };
      let message = '';
      let icon = '';
      let isClickable = false;
      
      if(n.type === 'like') { 
        message = `liked your video`; 
        icon = `<span class="text-neon-green">♥</span>`; 
        if(n.video_id) {
          const video = posts.find(p => p.id == n.video_id);
          if(video) message += `: "${video.title}"`;
          isClickable = true;
        }
      } else if(n.type === 'comment') { 
        message = `commented: "${n.content}"`; 
        icon = `<span class="text-neon-cyan">💬</span>`; 
        if(n.video_id) {
          const video = posts.find(p => p.id == n.video_id);
          if(video) message += ` on "${video.title}"`;
          isClickable = true;
        }
      } else if(n.type === 'follow') { 
        message = `started following you`; 
        icon = `<span class="text-neon-purple">👤</span>`; 
      }
      
      const clickClass = isClickable ? 'cursor-pointer hover:bg-dark-600 transition' : '';
      const clickAction = isClickable ? `onclick="closeModal(); showVideo('${n.video_id}')"` : '';
      
      html += `<div class="p-3 bg-dark-700 rounded flex items-center gap-3 ${!n.is_read ? 'border-l-4 border-neon-cyan' : ''} ${clickClass}" ${clickAction}>
        <img src="${actor.avatar_url||''}" class="w-8 h-8 rounded-full">
        <div class="flex-1"><span class="font-bold text-white">@${actor.username}</span> ${message}</div>
        <div class="text-lg">${icon}</div>
      </div>`;
    });
  }
  html += `</div>`;
  showModal(html); 
}

document.addEventListener('DOMContentLoaded', init);
</script>
