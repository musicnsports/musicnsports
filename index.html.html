<script>
// ===== SUPABASE SETUP - REPLACE THE KEY BELOW =====
const SUPABASE_URL = 'https://dsgilznlijicfwxgxilv.supabase.co';
const SUPABASE_ANON_KEY = eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRzZ2lsem5saWppY2Z3eGd4aWx2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5MDEzNjIsImV4cCI6MjA5OTQ3NzM2Mn0.y0pvBThvU6YX3x-nqJj3Aow_YLPWb-b-3Yw9EezUtGA; // <-- Go to Supabase > Settings > API > anon public key
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ===== STATE =====
let currentUser = null;
let currentProfile = null;
let usersCache = {}; // id -> profile for quick lookup
let posts = [];
let likesMap = {}; // video_id -> array of likes
let commentsMap = {}; // video_id -> array of comments
let followsCache = {}; // follower_id -> { following_id: true }

const $ = sel => document.querySelector(sel);
const $$ = sel => document.querySelectorAll(sel);
const getYouTubeId = url => { const m = url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/); return m ? m[1] : null; };
const getVimeoId = url => { const m = url.match(/vimeo\.com\/(\d+)/); return m ? m[1] : null; };
const getVideoId = url => getYouTubeId(url) || getVimeoId(url);
const timeAgo = ts => { const d = new Date(ts); const s = Math.floor((Date.now() - d.getTime())/1000); if(s<60) return `${s}s ago`; const m=Math.floor(s/60); if(m<60) return `${m}m ago`; const h=Math.floor(m/60); if(h<24) return `${h}h ago`; const day=Math.floor(h/24); return `${day}d ago`; };
const thumbFromUrl = url => { const y = getYouTubeId(url); if(y) return `https://img.youtube.com/vi/${y}/mqdefault.jpg`; return 'https://via.placeholder.com/320x180?text=Video'; };

// ===== INIT =====
async function init(){
  const { data: { session } } = await supabase.auth.getSession();
  if(session?.user){ await loadProfile(session.user); }
  await loadAllData();
  showMain();
  renderAuth();
  supabase.auth.onAuthStateChange(async (e, session) => {
    if(session?.user){ await loadProfile(session.user); } else { currentUser=null; currentProfile=null; }
    renderAuth();
    await loadAllData();
    if(document.getElementById('videoGrid')) renderFeed();
  });
}

async function loadProfile(user){
  currentUser = user;
  let { data } = await supabase.from('profiles').select('*').eq('id', user.id).single();
  if(!data){
    const username = user.email.split('@')[0].replace(/[^a-z0-9_]/gi,'');
    const { data: newP } = await supabase.from('profiles').insert({ id: user.id, username, avatar_url: `https://api.dicebear.com/7.x/thumbs/svg?seed=${username}`, bio: '' }).select().single();
    data = newP;
  }
  currentProfile = data;
  usersCache[data.id] = data;
}

async function loadAllData(){
  const { data: profiles } = await supabase.from('profiles').select('*');
  (profiles||[]).forEach(p=> usersCache[p.id]=p);
  
  const { data: videos } = await supabase.from('videos').select('*').order('created_at', {ascending:false});
  posts = videos || [];

  const { data: likes } = await supabase.from('likes').select('*');
  const { data: comments } = await supabase.from('comments').select('*');
  const { data: follows } = await supabase.from('followers').select('*');

  likesMap={}; commentsMap={}; followsCache={};
  (likes||[]).forEach(l=>{ if(!likesMap[l.video_id]) likesMap[l.video_id]=[]; likesMap[l.video_id].push(l); });
  (comments||[]).forEach(c=>{ if(!commentsMap[c.video_id]) commentsMap[c.video_id]=[]; commentsMap[c.video_id].push(c); });
  (follows||[]).forEach(f=>{ if(!followsCache[f.follower_id]) followsCache[f.follower_id]={}; followsCache[f.follower_id][f.following_id]=true; });

  // DEMO SEED if empty - so you don't see blank page
  if(posts.length===0){
    const demoId = 'demo-user-1';
    usersCache[demoId] = { id: demoId, username: 'highlight_king', avatar_url: 'https://api.dicebear.com/7.x/thumbs/svg?seed=highlight_king', bio: 'Posting the best mixes daily.' };
    posts = [{
      id: 'demo-post-1', user_id: demoId, title: 'Lebron James Top 10 Dunks on Trap Beat', video_url: 'https://www.youtube.com/watch?v=dQw4w9WgXcQ', video_id: 'dQw4w9WgXcQ', sport: 'NBA', music: 'Hip-Hop', description: 'The king of the court meets the king of the beats.', thumbnail: 'https://img.youtube.com/vi/dQw4w9WgXcQ/mqdefault.jpg', created_at: new Date(Date.now()-86400000).toISOString()
    }];
    likesMap['demo-post-1'] = [];
    commentsMap['demo-post-1'] = [];
  }
}

// ===== AUTH UI =====
function renderAuth(){
  const el = $('#authSection');
  if(currentUser && currentProfile){
    el.innerHTML = `<div class="flex items-center gap-3"><button onclick="showProfile('${currentUser.id}')" class="flex items-center gap-2 hover:bg-white/5 rounded-lg px-3 py-2 transition"><img src="${currentProfile.avatar_url}" class="w-8 h-8 rounded-full"><span class="font-semibold hidden sm:block">@${currentProfile.username}</span></button><button onclick="logout()" class="text-gray-400 hover:text-white text-sm">Logout</button></div>`;
    const btn = document.getElementById('uploadBtn'); if(btn) btn.classList.remove('hidden');
  } else {
    el.innerHTML = `<button onclick="showLogin()" class="px-4 py-2 text-gray-300 hover:text-white transition">Login</button><button onclick="showSignup()" class="px-4 py-2 bg-neon-cyan text-dark-900 font-semibold rounded-lg btn-glow transition">Sign Up</button>`;
    const btn = document.getElementById('uploadBtn'); if(btn) btn.classList.add('hidden');
  }
}
async function logout(){ await supabase.auth.signOut(); currentUser=null; currentProfile=null; showMain(); }

// ===== MODALS =====
function showModal(content, isWide=false){
  const c = $('#modalContainer');
  c.innerHTML = `<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm" onclick="if(event.target===this) closeModal()"><div class="glass rounded-2xl p-6 w-full ${isWide?'max-w-3xl':'max-w-md'} relative max-h-[90vh] overflow-y-auto"><button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>${content}</div></div>`;
}
function closeModal(){ $('#modalContainer').innerHTML=''; }

function showSignup(){ showModal(`<h3 class="font-display font-bold text-2xl mb-6">Create Account</h3><form onsubmit="handleSignup(event)" class="space-y-4"><input id="su_email" type="email" placeholder="Email" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3 focus:outline-none focus:border-neon-cyan"><input id="su_username" type="text" placeholder="Username" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3 focus:outline-none focus:border-neon-cyan"><input id="su_password" type="password" placeholder="Password" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3 focus:outline-none focus:border-neon-cyan"><button class="w-full py-3 bg-gradient-to-r from-neon-cyan to-neon-green text-dark-900 font-bold rounded-lg btn-glow">Sign Up</button><p class="text-center text-gray-400 text-sm">Already have an account? <button type="button" onclick="closeModal(); showLogin()" class="text-neon-cyan hover:underline">Login</button></p></form>`); }
async function handleSignup(e){
  e.preventDefault();
  const email = document.getElementById('su_email').value.trim();
  const username = document.getElementById('su_username').value.trim().replace(/\s+/g,'_');
  const password = document.getElementById('su_password').value;
  const { data: existing } = await supabase.from('profiles').select('id').eq('username', username).maybeSingle();
  if(existing) return alert('Username taken');
  const { data, error } = await supabase.auth.signUp({ email, password });
  if(error) return alert(error.message);
  if(data.user){
    await supabase.from('profiles').insert({ id: data.user.id, username, avatar_url: `https://api.dicebear.com/7.x/thumbs/svg?seed=${username}`, bio: '' });
    closeModal(); alert('Account created! If email confirmation is on, check your inbox, then Login.');
  }
}
function showLogin(){ showModal(`<h3 class="font-display font-bold text-2xl mb-6">Welcome Back</h3><form onsubmit="handleLogin(event)" class="space-y-4"><input id="li_email" type="email" placeholder="Email" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3 focus:outline-none focus:border-neon-cyan"><input id="li_password" type="password" placeholder="Password" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3 focus:outline-none focus:border-neon-cyan"><button class="w-full py-3 bg-gradient-to-r from-neon-cyan to-neon-green text-dark-900 font-bold rounded-lg btn-glow">Login</button><p class="text-center text-gray-400 text-sm">No account? <button type="button" onclick="closeModal(); showSignup()" class="text-neon-cyan hover:underline">Sign Up</button></p></form>`); }
async function handleLogin(e){ e.preventDefault(); const email=document.getElementById('li_email').value.trim(); const password=document.getElementById('li_password').value; const { error } = await supabase.auth.signInWithPassword({ email, password }); if(error) return alert(error.message); closeModal(); }

// ===== FEED =====
function showMain(){
  document.getElementById('mainContent').innerHTML = `
    <section class="text-center mb-12 animate-slide-up">
      <h2 class="font-display font-black text-4xl md:text-6xl mb-4 bg-gradient-to-r from-neon-cyan via-neon-green to-neon-purple bg-clip-text text-transparent">Where Beats Meet Highlights</h2>
      <p class="text-gray-400 text-lg max-w-2xl mx-auto mb-8">Post your fire sports edits. Match NBA dunks with Hip-Hop. UFC KOs with EDM. Soccer bangers with Rock.</p>
      <button id="uploadBtn" onclick="openUploadModal()" class="px-8 py-4 bg-gradient-to-r from-neon-cyan to-neon-green text-dark-900 font-bold rounded-xl btn-glow transition-all hover:scale-105 ${!currentUser?'hidden':''}">Post Your Mix</button>
    </section>
    <section class="glass rounded-2xl p-4 mb-8 sticky top-20 z-40">
      <div class="grid grid-cols-1 md:grid-cols-5 gap-3">
        <input id="searchInput" type="text" placeholder="Search title, user, or description..." class="md:col-span-2 bg-dark-700 border border-white/10 rounded-lg px-4 py-2 focus:outline-none focus:border-neon-cyan">
        <select id="sportFilter" class="bg-dark-700 border border-white/10 rounded-lg px-4 py-2 focus:outline-none focus:border-neon-cyan"><option value="all">All Sports</option><option>NBA</option><option>NFL</option><option>Soccer</option><option>UFC</option><option>Other</option></select>
        <select id="musicFilter" class="bg-dark-700 border border-white/10 rounded-lg px-4 py-2 focus:outline-none focus:border-neon-cyan"><option value="all">All Music</option><option>Hip-Hop</option><option>Rock</option><option>EDM</option><option>Pop</option><option>Other</option></select>
        <select id="sortFilter" class="bg-dark-700 border border-white/10 rounded-lg px-4 py-2 focus:outline-none focus:border-neon-cyan"><option value="newest">Newest</option><option value="likes">Most Liked</option><option value="comments">Most Commented</option></select>
      </div>
    </section>
    <section id="videoGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-16"></section>
    <section class="glass rounded-2xl p-8 mb-8"><h3 class="font-display font-bold text-2xl mb-4 text-neon-cyan">Community Guidelines</h3><div class="space-y-3 text-gray-300 text-sm"><p><strong class="text-white">1. Keep it Sports + Music:</strong> All posts must pair sports content with music.</p><p><strong class="text-white">2. No Hate or Harassment:</strong> Respect athletes, artists, and users.</p><p><strong class="text-white">3. Own Your Content:</strong> Only post videos you have rights to share.</p><p><strong class="text-white">4. NSFW = Ban:</strong> No nudity, graphic violence, or illegal content.</p><p><strong class="text-white">5. No Spam:</strong> Don't repost the same video.</p></div></section>
    <section class="glass rounded-2xl p-8 mb-16"><h3 class="font-display font-bold text-2xl mb-6 text-neon-green">FAQ</h3><div class="space-y-6"><div><h4 class="font-semibold text-white mb-2">Is the website free to use?</h4><p class="text-gray-400">YES. Absolutely FREE.</p></div><div><h4 class="font-semibold text-white mb-2">What types of videos can I post?</h4><p class="text-gray-400">Any sports related content with music. From the most popular sports to dance competitions and hot dog eating contests. Anything recognized as a sport.</p></div><div><h4 class="font-semibold text-white mb-2">Do I need to upload video files?</h4><p class="text-gray-400">Nope. Just paste a YouTube or Vimeo link.</p></div><div><h4 class="font-semibold text-white mb-2">Can I post the same video twice?</h4><p class="text-gray-400">No. Our system blocks duplicate YouTube/Vimeo IDs.</p></div></div></section>
  `;
  document.getElementById('searchInput')?.addEventListener('input', renderFeed);
  document.getElementById('sportFilter')?.addEventListener('change', renderFeed);
  document.getElementById('musicFilter')?.addEventListener('change', renderFeed);
  document.getElementById('sortFilter')?.addEventListener('change', renderFeed);
  renderFeed();
}

function renderFeed(){
  const grid = document.getElementById('videoGrid'); if(!grid) return;
  const search = (document.getElementById('searchInput')?.value||'').toLowerCase();
  const sport = document.getElementById('sportFilter')?.value||'all';
  const music = document.getElementById('musicFilter')?.value||'all';
  const sort = document.getElementById('sortFilter')?.value||'newest';
  let filtered = posts.filter(p=>{
    const u = usersCache[p.user_id]; const matchSearch=!search||p.title?.toLowerCase().includes(search)||p.description?.toLowerCase().includes(search)||u?.username?.toLowerCase().includes(search);
    const matchSport=sport==='all'||p.sport===sport; const matchMusic=music==='all'||p.music===music; return matchSearch&&matchSport&&matchMusic;
  });
  if(sort==='likes') filtered.sort((a,b)=>(likesMap[b.id]?.length||0)-(likesMap[a.id]?.length||0));
  else if(sort==='comments') filtered.sort((a,b)=>(commentsMap[b.id]?.length||0)-(commentsMap[a.id]?.length||0));
  else filtered.sort((a,b)=> new Date(b.created_at) - new Date(a.created_at));
  if(filtered.length===0){ grid.innerHTML=`<div class="col-span-full text-center py-20 text-gray-500">No posts found. Be the first to post!</div>`; return; }
  grid.innerHTML = filtered.map(p=>{
    const u = usersCache[p.user_id]||{username:'user', avatar_url:''};
    const likeCount = likesMap[p.id]?.length||0; const commentCount = commentsMap[p.id]?.length||0;
    const isLiked = currentUser && likesMap[p.id]?.some(l=>l.user_id===currentUser.id);
    return `<article class="glass rounded-2xl overflow-hidden hover:scale-[1.02] transition"><div class="aspect-video bg-dark-800 relative cursor-pointer" onclick="showVideo('${p.id}')"><img src="${p.thumbnail||thumbFromUrl(p.video_url)}" class="w-full h-full object-cover"><div class="absolute inset-0 bg-gradient-to-t from-dark-900/80 to-transparent"></div><div class="absolute bottom-3 left-3 flex gap-2"><span class="px-2 py-1 bg-neon-cyan/20 border border-neon-cyan/40 rounded text-xs font-semibold">${p.sport}</span><span class="px-2 py-1 bg-neon-purple/20 border border-neon-purple/40 rounded text-xs font-semibold">${p.music}</span></div></div><div class="p-4"><h3 class="font-bold text-lg mb-1 line-clamp-2">${p.title}</h3><p class="text-gray-400 text-sm mb-3 line-clamp-2">${p.description||''}</p><div class="flex items-center justify-between"><button onclick="event.stopPropagation(); showProfile('${p.user_id}')" class="flex items-center gap-2 hover:opacity-80"><img src="${u.avatar_url}" class="w-7 h-7 rounded-full"><span class="text-sm text-gray-300">@${u.username}</span></button><div class="flex items-center gap-4 text-sm text-gray-400"><button onclick="event.stopPropagation(); toggleLike('${p.id}')" class="flex items-center gap-1 hover:text-neon-green ${isLiked?'text-neon-green':''}"><svg class="w-5 h-5 ${isLiked?'fill-current':''}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 0 00-6.364 0z"></path></svg>${likeCount}</button><span class="flex items-center gap-1"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>${commentCount}</span></div></div></div></article>`;
  }).join('');
}

// ===== UPLOAD =====
function openUploadModal(){ if(!currentUser) return showLogin(); showModal(`<h3 class="font-display font-bold text-2xl mb-6">Post Your Mix</h3><form onsubmit="handleUpload(event)" class="space-y-4"><input id="up_title" type="text" placeholder="Title" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3 focus:border-neon-cyan focus:outline-none"><input id="up_url" type="url" placeholder="YouTube or Vimeo URL" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3 focus:border-neon-cyan focus:outline-none"><select id="up_sport" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3"><option value="">Select Sport</option><option>NBA</option><option>NFL</option><option>Soccer</option><option>UFC</option><option>Other</option></select><select id="up_music" required class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3"><option value="">Select Music</option><option>Hip-Hop</option><option>Rock</option><option>EDM</option><option>Pop</option><option>Other</option></select><textarea id="up_desc" rows="3" placeholder="Description..." class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3"></textarea><button class="w-full py-3 bg-gradient-to-r from-neon-cyan to-neon-green text-dark-900 font-bold rounded-lg">Post Mix</button></form>`); }
async function handleUpload(e){
  e.preventDefault();
  const title=document.getElementById('up_title').value.trim();
  const video_url=document.getElementById('up_url').value.trim();
  const sport=document.getElementById('up_sport').value;
  const music=document.getElementById('up_music').value;
  const description=document.getElementById('up_desc').value.trim();
  const video_id = getVideoId(video_url);
  if(!video_id) return alert('Invalid YouTube or Vimeo URL');
  const { data: dup } = await supabase.from('videos').select('id').eq('user_id', currentUser.id).eq('video_id', video_id);
  if(dup && dup.length>0) return alert('You already posted this video!');
  const thumbnail = thumbFromUrl(video_url);
  const { error } = await supabase.from('videos').insert({ user_id: currentUser.id, title, video_url, video_id, sport, music, description, thumbnail });
  if(error) return alert(error.message);
  closeModal(); await loadAllData(); showMain();
}

// ===== LIKES / COMMENTS / VIDEO =====
async function toggleLike(postId){
  if(!currentUser) return showLogin();
  if(postId.startsWith('demo-')) return alert('Demo post - create a real account and post to like for real!');
  const existing = likesMap[postId]?.find(l=>l.user_id===currentUser.id);
  if(existing){ await supabase.from('likes').delete().eq('id', existing.id); } else { await supabase.from('likes').insert({ user_id: currentUser.id, video_id: postId }); }
  await loadAllData(); renderFeed(); if(document.getElementById('videoModalInner')) showVideo(postId);
}
async function showVideo(postId){
  const p = posts.find(x=>x.id===postId); if(!p) return;
  const u = usersCache[p.user_id]||{username:'user', avatar_url:''};
  const isYt = getYouTubeId(p.video_url); const embed = isYt ? `https://www.youtube.com/embed/${p.video_id}?autoplay=1` : `https://player.vimeo.com/video/${p.video_id}?autoplay=1`;
  const { data: commentRows } = postId.startsWith('demo-') ? {data:[]} : await supabase.from('comments').select('*, profiles!comments_user_id_fkey(username, avatar_url)').eq('video_id', postId).order('created_at',{ascending:true});
  const likeCount = likesMap[postId]?.length||0; const isLiked = currentUser && likesMap[postId]?.some(l=>l.user_id===currentUser.id);
  showModal(`<div id="videoModalInner" class="space-y-4"><div class="aspect-video bg-black rounded-xl overflow-hidden"><iframe src="${embed}" class="w-full h-full" frameborder="0" allow="autoplay; fullscreen" allowfullscreen></iframe></div><div class="flex items-center justify-between"><h3 class="font-bold text-xl">${p.title}</h3><button onclick="toggleLike('${p.id}')" class="px-3 py-1 rounded-lg ${isLiked?'bg-neon-green text-dark-900':'bg-dark-700'}">${isLiked?'♥ Liked':'♡ Like'} ${likeCount}</button></div><p class="text-gray-400 text-sm">${p.description||''}</p><div class="border-t border-white/10 pt-4"><h4 class="font-semibold mb-3">Comments (${commentRows?.length||0})</h4><div class="space-y-3 mb-4 max-h-60 overflow-y-auto">${(commentRows||[]).map(c=>{ const cu=c.profiles||usersCache[c.user_id]||{}; return `<div class="flex gap-3"><img src="${cu.avatar_url||''}" class="w-8 h-8 rounded-full"><div class="flex-1 bg-dark-700 rounded-lg px-3 py-2"><div class="flex justify-between"><span class="font-semibold text-sm">@${cu.username||'user'}</span><span class="text-xs text-gray-500">${timeAgo(c.created_at)}</span></div><p class="text-sm text-gray-300 mt-1">${c.content||c.text}</p>${currentUser?.id===c.user_id?`<button onclick="deleteComment('${c.id}','${postId}')" class="text-xs text-red-400 mt-1">Delete</button>`:''}</div></div>` }).join('')||'<p class="text-gray-500 text-sm">No comments yet.</p>'}</div>${currentUser?`<form onsubmit="addComment(event,'${postId}')" class="flex gap-2"><input id="commentInput" placeholder="Add a comment..." required class="flex-1 bg-dark-700 border border-white/10 rounded-lg px-4 py-2"><button class="px-4 py-2 bg-neon-cyan text-dark-900 font-bold rounded-lg">Post</button></form>`:'<p class="text-sm text-gray-500">Login to comment</p>'}</div></div>`, true);
}
async function addComment(e, videoId){ e.preventDefault(); if(videoId.startsWith('demo-')) return alert('Demo post - post a real video to comment!'); const content=document.getElementById('commentInput').value.trim(); if(!content) return; const { error } = await supabase.from('comments').insert({ user_id: currentUser.id, video_id: videoId, content }); if(error) return alert(error.message); showVideo(videoId); await loadAllData(); }
async function deleteComment(id, videoId){ if(!confirm('Delete?')) return; await supabase.from('comments').delete().eq('id', id); showVideo(videoId); await loadAllData(); }

// ===== PROFILE / FOLLOW =====
async function showProfile(userId){
  const profile = usersCache[userId] || (await supabase.from('profiles').select('*').eq('id', userId).single()).data;
  const { data: userPosts } = userId.startsWith('demo-') ? {data: posts.filter(p=>p.user_id===userId)} : await supabase.from('videos').select('*').eq('user_id', userId).order('created_at',{ascending:false});
  const { data: followers } = userId.startsWith('demo-') ? {data:[]} : await supabase.from('followers').select('*').eq('following_id', userId);
  const { data: following } = userId.startsWith('demo-') ? {data:[]} : await supabase.from('followers').select('*').eq('follower_id', userId);
  let isFollowing=false; if(currentUser && !userId.startsWith('demo-')){ const { data } = await supabase.from('followers').select('*').eq('follower_id', currentUser.id).eq('following_id', userId).maybeSingle(); isFollowing=!!data; }
  const isOwn = currentUser?.id===userId;
  document.getElementById('mainContent').innerHTML = `<div class="max-w-4xl mx-auto"><button onclick="showMain()" class="mb-6 text-gray-400 hover:text-white">← Back to Feed</button><div class="glass rounded-2xl p-8 mb-8"><div class="flex gap-6 items-start"><img src="${profile.avatar_url}" class="w-24 h-24 rounded-full border-4 border-neon-cyan/30"><div class="flex-1"><div class="flex items-center gap-4 mb-2"><h2 class="font-display font-bold text-3xl">@${profile.username}</h2>${currentUser&&!isOwn?`<button onclick="toggleFollow('${userId}')" class="px-4 py-2 ${isFollowing?'bg-dark-600':'bg-neon-cyan text-dark-900'} font-semibold rounded-lg text-sm">${isFollowing?'Unfollow':'Follow'}</button>`:''}${isOwn?`<button onclick="showEditProfile()" class="px-4 py-2 bg-dark-600 rounded-lg text-sm">Edit Profile</button>`:''}</div><p class="text-gray-400 mb-4">${profile.bio||'No bio yet.'}</p><div class="flex gap-6 text-sm"><span><strong class="text-white">${userPosts?.length||0}</strong> Posts</span><span><strong class="text-white">${followers?.length||0}</strong> Followers</span><span><strong class="text-white">${following?.length||0}</strong> Following</span></div></div></div></div><div class="grid grid-cols-1 md:grid-cols-3 gap-6">${(userPosts||[]).map(p=>`<article class="glass rounded-2xl overflow-hidden cursor-pointer" onclick="showVideo('${p.id}')"><div class="aspect-video bg-dark-800"><img src="${p.thumbnail||thumbFromUrl(p.video_url)}" class="w-full h-full object-cover"></div><div class="p-4"><h3 class="font-bold line-clamp-2">${p.title}</h3><p class="text-xs text-gray-500 mt-1">${timeAgo(p.created_at)}</p>${isOwn?`<button onclick="event.stopPropagation(); deletePost('${p.id}')" class="mt-2 text-xs text-red-400">Delete</button>`:''}</div></article>`).join('')||'<p class="col-span-full text-center text-gray-500 py-20">No posts yet.</p>'}</div></div>`;
}
async function toggleFollow(followingId){ if(!currentUser) return showLogin(); if(followingId===currentUser.id) return; const { data } = await supabase.from('followers').select('*').eq('follower_id', currentUser.id).eq('following_id', followingId).maybeSingle(); if(data){ await supabase.from('followers').delete().eq('id', data.id); } else { await supabase.from('followers').insert({ follower_id: currentUser.id, following_id: followingId }); } await loadAllData(); showProfile(followingId); }
async function deletePost(id){ if(!confirm('Delete?')) return; await supabase.from('videos').delete().eq('id', id); await loadAllData(); showProfile(currentUser.id); }
function showEditProfile(){ if(!currentProfile) return; showModal(`<h3 class="font-display font-bold text-2xl mb-6">Edit Profile</h3><form onsubmit="handleEditProfile(event)" class="space-y-4"><label class="text-sm text-gray-400">Bio</label><textarea id="edit_bio" rows="3" class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3">${currentProfile.bio||''}</textarea><label class="text-sm text-gray-400">Avatar URL</label><input id="edit_avatar" type="url" value="${currentProfile.avatar_url}" class="w-full bg-dark-700 border border-white/10 rounded-lg px-4 py-3"><button class="w-full py-3 bg-gradient-to-r from-neon-cyan to-neon-green text-dark-900 font-bold rounded-lg">Save</button></form>`); }
async function handleEditProfile(e){ e.preventDefault(); const bio=document.getElementById('edit_bio').value.trim(); const avatar_url=document.getElementById('edit_avatar').value.trim(); const { error } = await supabase.from('profiles').update({ bio, avatar_url }).eq('id', currentUser.id); if(error) return alert(error.message); closeModal(); await loadProfile(currentUser); await loadAllData(); showProfile(currentUser.id); }
function showNotifications(){ showModal(`<h3 class="font-bold text-xl mb-4">Notifications</h3><div class="space-y-3 text-sm"><div class="p-3 bg-dark-700 rounded-lg">@hooper liked your NBA mix 2h ago</div><div class="p-3 bg-dark-700 rounded-lg">@edmfan commented: "fire edit"</div><div class="p-3 bg-dark-700 rounded-lg">New follower: @rockhead</div><p class="text-gray-500 text-xs pt-2">Enable Realtime in Supabase for live notifications.</p></div>`); }

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
